<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-clients.js" defer></script>
    <script src="js/ui-components.js" defer></script>
    <script src="js/basicfeat.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/visitor.js" defer></script>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ── POST CARD ── */
        .forum-post {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .forum-post:hover {
            border-color: rgba(0, 234, 255, 0.2);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .post-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 234, 255, 0.5);
            object-fit: cover;
            flex-shrink: 0;
        }

        .post-meta {
            flex: 1;
        }

        .post-username {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }

        .post-time {
            font-size: 11px;
            color: #666;
            margin-top: 1px;
        }

        .post-title {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .post-body {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.6;
            margin-bottom: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post-actions {
            display: flex;
            align-items: center;
            gap: 18px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .action-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: #00eaff;
        }

        .action-btn.liked {
            color: #ff4757;
        }

        .action-btn i {
            font-size: 15px;
        }

        /* ── DELETE BTN (pemilik) ── */
        .post-delete-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 14px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            margin-left: auto;
        }

        .post-delete-btn:hover {
            color: #ff4757;
        }

        /* ── COMPOSE (left panel) ── */
        .compose-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
        }

        .compose-box h3 {
            font-size: 14px;
            font-weight: 700;
            color: #00eaff;
            margin-bottom: 14px;
        }

        .compose-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px 12px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
            margin-bottom: 8px;
            resize: none;
        }

        .compose-input:focus {
            border-color: #00eaff;
        }

        .compose-input::placeholder {
            color: #555;
        }

        /* ── COMMENT DRAWER ── */
        .comment-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .comment-backdrop.show {
            opacity: 1;
            pointer-events: all;
        }

        .comment-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 680px;
            margin: 0 auto;
            height: 75vh;
            background: #111114;
            border-radius: 20px 20px 0 0;
            z-index: 2001;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .comment-drawer.show {
            transform: translateY(0);
        }

        .drawer-handle {
            width: 36px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 12px auto 0;
            flex-shrink: 0;
        }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            flex-shrink: 0;
        }

        .drawer-header span {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }

        .drawer-close {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        .comment-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .comment-list::-webkit-scrollbar {
            width: 3px;
        }

        .comment-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* ── SINGLE COMMENT (IG style) ── */
        .comment-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            align-items: flex-start;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .comment-body {
            flex: 1;
            min-width: 0;
        }

        .comment-name {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2px;
        }

        .comment-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            word-break: break-word;
        }

        .comment-time {
            font-size: 10px;
            color: #555;
            margin-top: 4px;
        }

        .comment-delete {
            background: none;
            border: none;
            color: #444;
            font-size: 12px;
            cursor: pointer;
            padding: 2px 4px;
            transition: color 0.2s;
            flex-shrink: 0;
            margin-top: 6px;
        }

        .comment-delete:hover {
            color: #ff4757;
        }

        /* ── COMMENT INPUT BAR ── */
        .comment-input-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            flex-shrink: 0;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }

        .comment-input-bar img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .comment-input-wrap {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 8px;
        }

        .comment-input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            padding: 10px 0;
        }

        .comment-input::placeholder {
            color: #555;
        }

        .comment-send {
            background: none;
            border: none;
            color: #00eaff;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .comment-send:disabled {
            opacity: 0.3;
            cursor: default;
        }

        /* ── EMPTY / LOADING ── */
        .forum-empty {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }

        .forum-empty i {
            font-size: 36px;
            margin-bottom: 12px;
            display: block;
        }

        .forum-empty p {
            font-size: 13px;
        }

        .comment-loading {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 13px;
        }

        /* ── SKELETON ── */
        .sk-forum {
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                opacity: 0.4;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">

        <!-- LEFT: Compose -->
        <div class="left-section">
            <div class="glow">
                <h1><i class="fa-solid fa-comments" style="font-size:24px;"></i> Forum</h1>
            </div>

            <div class="compose-box">
                <h3><i class="fa-solid fa-pen-to-square"></i> Posting Diskusi</h3>
                <input id="topicTitle" class="compose-input" type="text" placeholder="Judul...">
                <textarea id="topicContent" class="compose-input" placeholder="Apa yang mau kamu tanyain atau bahas?"
                    rows="4"></textarea>
                <button onclick="postNewTopic()" class="btn-glass-save" style="width:100%; margin-top:4px;">
                    <i class="fa-solid fa-paper-plane"></i> Posting
                </button>
            </div>
        </div>

        <!-- RIGHT: Feed -->
        <div class="right-section">
            <div id="forumFeed">
                <!-- Skeleton -->
                <div class="forum-post sk-forum">
                    <div class="post-header">
                        <div class="skeleton" style="width:38px;height:38px;border-radius:50%;"></div>
                        <div>
                            <div class="skeleton" style="width:90px;height:11px;border-radius:4px;margin-bottom:5px;">
                            </div>
                            <div class="skeleton" style="width:60px;height:9px;border-radius:4px;"></div>
                        </div>
                    </div>
                    <div class="skeleton" style="width:60%;height:14px;border-radius:4px;margin-bottom:8px;"></div>
                    <div class="skeleton" style="width:100%;height:10px;border-radius:4px;margin-bottom:5px;"></div>
                    <div class="skeleton" style="width:80%;height:10px;border-radius:4px;"></div>
                </div>
                <div class="forum-post sk-forum">
                    <div class="post-header">
                        <div class="skeleton" style="width:38px;height:38px;border-radius:50%;"></div>
                        <div>
                            <div class="skeleton" style="width:80px;height:11px;border-radius:4px;margin-bottom:5px;">
                            </div>
                            <div class="skeleton" style="width:50px;height:9px;border-radius:4px;"></div>
                        </div>
                    </div>
                    <div class="skeleton" style="width:50%;height:14px;border-radius:4px;margin-bottom:8px;"></div>
                    <div class="skeleton" style="width:100%;height:10px;border-radius:4px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- COMMENT DRAWER -->
    <div class="comment-backdrop" id="commentBackdrop" onclick="closeCommentDrawer()"></div>
    <div class="comment-drawer" id="commentDrawer">
        <div class="drawer-handle"></div>
        <div class="drawer-header">
            <span id="drawerTitle">Komentar</span>
            <button class="drawer-close" onclick="closeCommentDrawer()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="comment-list" id="commentList">
            <div class="comment-loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat...</div>
        </div>
        <div class="comment-input-bar">
            <img id="commentUserAvatar" src="icons/profpicture.png">
            <div class="comment-input-wrap">
                <input class="comment-input" id="commentInput" placeholder="Tambah komentar..." autocomplete="off">
                <button class="comment-send" id="commentSendBtn" onclick="sendComment()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="js/forum.js" defer></script>
</body>

</html>
