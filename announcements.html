<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-clients.js" defer></script>
    <script src="js/ui-components.js" defer></script>
    <script src="js/basicfeat.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/visitor.js" defer></script>
    <script src="js/subject-manager.js" defer></script>
    <link rel="stylesheet" href="css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Class App">
    <link rel="apple-touch-icon" href="icons/announcements.png">
    <script>
        window.__pwaPrompt = null;
        window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            window.__pwaPrompt = e;
            window.dispatchEvent(new Event('pwa-ready'));
        });
    </script>
</head>

<body>

    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">
        <div class="left-section">
            <h2 id="welcomeText"></h2>
        </div>
        <div class="right-section">

            <!-- PWA INSTALL CARD -->
            <div id="pwaInstallCard" class="course-card" style="
                border: 1.5px solid rgba(0, 234, 255, 0.25);
                background: linear-gradient(135deg, rgba(0,234,255,0.07) 0%, rgba(0,0,0,0.35) 100%);
                margin: 0 0 20px 0;
                transition: all 0.5s ease;
            ">
                <!-- State: Belum install -->
                <div id="pwaCardDefault">
                    <h3 style="margin: 0 0 6px 0; font-size: 18px; display:flex; align-items:center; gap:10px;">
                        <span style="font-size:22px;">📲</span> Coba install aplikasi yok
                    </h3>
                    <p style="color: rgba(255,255,255,0.65); font-size: 13px; line-height: 1.6; margin-bottom: 16px;">
                        Sekarang e-learning bisa berbentuk aplikasi, gak akan makan penyimpanan sedikit pun. Jadi coba
                        yuk install!
                    </p>
                    <div style="display:flex; justify-content:flex-end;">
                        <button id="installBtn" style="
                            background: linear-gradient(90deg, #00eaff, #007bff);
                            color: #000;
                            font-weight: 700;
                            border: none;
                            padding: 10px 22px;
                            border-radius: 8px;
                            cursor: pointer;
                            font-size: 14px;
                            letter-spacing: 0.3px;
                            transition: opacity 0.2s;
                        " onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
                            Install Sekarang
                        </button>
                    </div>
                </div>

            </div>
            <!-- END PWA INSTALL CARD -->

            <div id="announcements">
            </div>
            <div id="editControls"></div>
        </div>
    </div>

    <script src="js/daily-card.js" defer></script>

    <script>
        // ==========================================
        // PWA INSTALL CARD LOGIC — Source of truth: Supabase
        // ==========================================
        (function () {
            let deferredPrompt = null;

            // Tangkap beforeinstallprompt sesegera mungkin
            window.addEventListener('beforeinstallprompt', (e) => {
                deferredPrompt = e;
            });

            function hideCard() {
                const card = document.getElementById('pwaInstallCard');
                if (card) card.style.display = 'none';
            }

            // Cek Supabase: apakah user ini sudah accepted?
            async function checkAndRenderCard() {
                if (typeof supabase === 'undefined') {
                    setTimeout(checkAndRenderCard, 200);
                    return;
                }

                let user;
                try { user = JSON.parse(localStorage.getItem('user') || 'null'); } catch (e) { }
                if (!user) { hideCard(); return; }

                try {
                    const { data } = await supabase
                        .from('pwa_installs')
                        .select('id')
                        .eq('user_id', user.id)
                        .eq('outcome', 'accepted')
                        .limit(1)
                        .maybeSingle();

                    if (data) hideCard();
                    // Kalau null = belum install, card tetap tampil
                } catch (e) {
                    console.warn('[PWA] Gagal cek status install:', e);
                }
            }

            document.addEventListener('DOMContentLoaded', checkAndRenderCard);

            // Tombol Install diklik
            document.addEventListener('click', async (e) => {
                if (e.target?.id !== 'installBtn') return;

                const prompt = deferredPrompt || window.__pwaPrompt;
                if (!prompt) return;

                prompt.prompt();
                const { outcome } = await prompt.userChoice;

                // Simpan/update ke Supabase
                try {
                    const user = JSON.parse(localStorage.getItem('user') || 'null');
                    if (user && typeof supabase !== 'undefined') {
                        await supabase.from('pwa_installs').upsert({
                            user_id: user.id,
                            full_name: user.full_name || null,
                            nickname: user.nickname || user.short_name || null,
                            class_id: String(user.class_id),
                            outcome: outcome,
                            installed_at: new Date().toISOString()
                        }, { onConflict: 'user_id' });
                    }
                } catch (trackErr) {
                    console.warn('[PWA] Gagal track install:', trackErr);
                }

                if (outcome === 'accepted') {
                    hideCard();
                    showPopup('makasiii udah install aplikasinyaa. cek homescreen yaaa 🏠', 'success');
                } else {
                    showPopup('install dong, da moal nanaon', 'error');
                }

                deferredPrompt = null;
                window.__pwaPrompt = null;
            });

            // Install dari banner browser (bukan tombol)
            window.addEventListener('appinstalled', async () => {
                hideCard();
                try {
                    const user = JSON.parse(localStorage.getItem('user') || 'null');
                    if (user && typeof supabase !== 'undefined') {
                        await supabase.from('pwa_installs').upsert({
                            user_id: user.id,
                            full_name: user.full_name || null,
                            nickname: user.nickname || user.short_name || null,
                            class_id: String(user.class_id),
                            outcome: 'accepted',
                            installed_at: new Date().toISOString()
                        }, { onConflict: 'user_id' });
                    }
                } catch (trackErr) {
                    console.warn('[PWA] Gagal track appinstalled:', trackErr);
                }
            });
        })();
    </script>

    <script type="module">
        SubjectApp.init('announcements', '<h3><i class="fa-solid fa-bullhorn"></i> Class Announcements</h3>', 'Class Announcements', false); 
    </script>
</body>

</html>
