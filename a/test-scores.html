<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Nilai Ujian • E-Learning Nizam</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js" defer></script>
    <script src="../js/ctx-menu.js"></script>
    <script src="../js/ui-components.js" defer></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/lang.js"></script>
    <script src="../js/basicfeat.js"></script>
    <script src="../js/show-popup.js"></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/visitor.js" defer></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/bottom-nav.js"></script>
    <script src="../js/system-notice.js"></script>
    <link rel="stylesheet" href="../css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" id="pageIcon" href="../icons/app-icon.png" type="image/png">

    <style>
        /* -- Profile Card -- */
        #pp {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent, #00eaff);
            box-shadow: 0 0 10px var(--accent, #00eaff);
            float: left;
            margin-right: 20px;
        }

        .userInfo {
            height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #rataNum {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            margin-top: 10px;
        }

        /* -- Tabel -- */
        .personal-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .personal-table th,
        .personal-table td {
            padding: 8px;
            border: none;
            text-align: center;
        }

        .personal-table th {
            background: rgba(0, 234, 255, 0.1);
            color: var(--accent, #00eaff);
        }

        /* -- Podium -- */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .podium {
            width: 120px;
            border: 2px solid #b6ffda;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: center;
            position: relative;
            padding-top: 40px;
            margin-bottom: 20px;
        }

        .podium.p1 {
            height: 200px;
            background: rgba(255, 215, 0, 0.2);
            border-color: gold;
        }

        .podium.p2 {
            height: 170px;
            background: rgba(255, 215, 210, 0.2);
        }

        .podium.p3 {
            height: 150px;
        }

        .podium.pd {
            height: 140px;
        }

        .pp-top {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid white;
        }

        /* -- Mapel Selector -- */
        .mapel-select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid var(--accent, #00eaff);
            border-radius: 5px;
        }

        #peringkat {
            font-size: 22px;
        }
    </style>
</head>

<body>
    <!-- ══ SIDEBAR ══ -->
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- ══ MAIN CONTENT ══ -->
    <div class="main-content">

        <!-- LEFT: Nilai Personal + Podium -->
        <div class="left-section">
            <div class="glow">
                <h1 id="headerTitle"><i class="fa-solid fa-clipboard-check"></i> Nilai Ujian</h1>
            </div>

            <!-- Card Nilai Personal -->
            <div class="course-card">
                <img id="pp" src="">
                <div class="userInfo">
                    <p id="uname" style="margin:0; font-weight:bold;">@username</p>
                    <h3 id="name" style="margin:0; opacity:0.8;">Loading...</h3>
                </div>

                <h3>Daftar Nilai Kamu:</h3>
                <table class="personal-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Mapel</th>
                            <th>Nilai</th>
                            <th>KKM?</th>
                        </tr>
                    </thead>
                    <tbody id="personalTableBody"></tbody>
                </table>

                <div style="text-align:center; margin-top:20px;">
                    <h3 style="margin-bottom:5px;">Rata-Rata Kamu:</h3>
                    <h2 id="rataNum">-</h2>
                    <p id="ucapanText" style="margin-top:10px; font-style:italic;"></p>
                    <p id="peringkat" style="margin-top:10px; font-weight:bold; color:var(--accent, #00eaff);"></p>
                </div>
            </div>

            <!-- Card Leaderboard -->
            <div class="course-card">
                <h1 style="color:var(--accent, #00eaff);" id="leaderboardTitle">Top 15 Leaderboard</h1>
                <p style="opacity:0.8; margin-bottom:20px;" id="leaderboardDesc">Ranking Berdasarkan Rata-Rata Nilai</p>
                <div class="podium-container" id="podiumTop3"></div>
                <hr style="margin:30px 0; border-color:rgba(0,191,255,0.4);">
                <div class="podium-container" id="podiumRest"></div>
            </div>
        </div>

        <!-- RIGHT: Daftar Nilai Kelas -->
        <div class="right-section course-card">
            <h2 style="color:var(--accent, #00eaff);">Daftar Nilai Kelas</h2>
            <p style="opacity:0.7; margin-bottom:15px;">Pilih Mapel untuk melihat nilai semua siswa.</p>

            <select id="mapelSelector" class="mapel-select" onchange="renderClassTable()">
                <!-- Dynamic Options -->
            </select>

            <table class="personal-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nama</th>
                        <th>Nilai</th>
                    </tr>
                </thead>
                <tbody id="classTableBody"></tbody>
            </table>
        </div>

    </div>

    <!-- ══ SCRIPT ══ -->
    <script>
        // -- Unified Config --
        const TEST_CONFIG = {
            'psts': {
                title: 'Nilai PSTS',
                table: 'nilai_psts',
                icon: 'fa-clipboard-check'
            },
            'psasi': {
                title: 'Nilai PSASI',
                table: 'nilai_psasi',
                icon: 'fa-file-invoice'
            }
        };

        const MAPEL_CONFIG = {
            pabp: 'PABP',
            pp: 'PP',
            bindo: 'B. Indonesia',
            bing: 'B. Inggris',
            mtk: 'Matematika',
            sejarah: 'Sejarah',
            bjepang: 'B. Jepang',
            bsunda: 'B. Sunda',
            senibudaya: 'Seni Budaya',
            informatika: 'Informatika',
            pjok: 'PJOK',
            proipas: 'Proipas',
            dasprog1: 'DASPROGRPL 1',
            dasprog2: 'DASPROGRPL 2',
            dasprog3: 'DASPROGRPL 3'
        };

        const KKM = 75;
        let globalData = [];
        let myGlobalData = [];
        let avatarMap = {};
        let currentTestId = 'psts'; // Default

        const localUser = JSON.parse(localStorage.getItem("user"));
        const myIdentifier = localUser ? (localUser.nickname || localUser.username) : null;

        // -- Init --
        document.addEventListener("DOMContentLoaded", async () => {
            // Get ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const testId = urlParams.get('id');
            if (testId && TEST_CONFIG[testId]) {
                currentTestId = testId;
            }

            const config = TEST_CONFIG[currentTestId];
            document.title = `${config.title} • E-Learning Nizam`;
            document.getElementById('headerTitle').innerHTML = `<i class="fa-solid ${config.icon}"></i> ${config.title}`;
            document.getElementById('leaderboardDesc').innerText = `Ranking Berdasarkan Rata-Rata ${config.title}`;

            // Populate Mapel Selector
            const mapelSel = document.getElementById('mapelSelector');
            let mapelHTML = '';
            for (let key in MAPEL_CONFIG) {
                mapelHTML += `<option value="${key}">${MAPEL_CONFIG[key]}</option>`;
            }
            mapelSel.innerHTML = mapelHTML;

            if (typeof SubjectApp !== 'undefined') SubjectApp.init(currentTestId, config.title);
            updateProfileUI(localUser);
            await loadData();
        });

        function updateProfileUI(user) {
            if (!user) return;
            if (document.getElementById('name')) document.getElementById('name').innerText = user.full_name || user.nickname;
            if (document.getElementById('uname')) document.getElementById('uname').innerText = `@${user.username || user.short_name || 'user'}`;
            if (document.getElementById('pp')) document.getElementById('pp').src = user.avatar_url || '../icons/profpicture.png';
        }

        function getDynamicColor(nilai) {
            const n = parseFloat(nilai);
            if (isNaN(n)) return "#888";
            if (n >= 90) return "#00eaff";
            if (n >= 80) return "#00cec9";
            if (n >= 70) return "#1abc9c";
            if (n >= 60) return "#2ecc71";
            if (n >= 50) return "#badc58";
            if (n >= 40) return "#f1c40f";
            if (n >= 30) return "#e67e22";
            if (n >= 20) return "#e74c3c";
            return "#c0392b";
        }

        async function loadData() {
            if (!localUser) return;
            const myClassId = localUser.class_id;
            const effectiveClassId = getEffectiveClassId();
            const tableName = TEST_CONFIG[currentTestId].table;

            try {
                const [{ data: nilaiData, error }, { data: usersData }, { data: myNilaiData }] = await Promise.all([
                    supabase.from(tableName).select('*').eq('class_id', effectiveClassId),
                    supabase.from('users').select('id, nickname').eq('class_id', effectiveClassId),
                    supabase.from(tableName).select('*').eq('class_id', myClassId)
                ]);

                if (error || !nilaiData) {
                    console.error('Data loading error:', error);
                    return;
                }

                if (usersData) {
                    usersData.forEach(u => {
                        if (u.nickname) avatarMap[u.nickname.toLowerCase()] = u.id;
                    });
                }

                myGlobalData = (myNilaiData || []).map(siswa => {
                    let total = 0, count = 0;
                    for (let key in MAPEL_CONFIG) {
                        const val = parseFloat(siswa[key]);
                        if (!isNaN(val)) { total += val; count++; }
                    }
                    return { ...siswa, average: count > 0 ? parseFloat((total / count).toFixed(2)) : 0 };
                });
                myGlobalData.sort((a, b) => b.average - a.average);

                globalData = nilaiData.map(siswa => {
                    let total = 0, count = 0;
                    for (let key in MAPEL_CONFIG) {
                        const val = parseFloat(siswa[key]);
                        if (!isNaN(val)) { total += val; count++; }
                    }
                    return { ...siswa, average: count > 0 ? parseFloat((total / count).toFixed(2)) : 0 };
                });
                globalData.sort((a, b) => b.average - a.average);

                renderPersonal();
                renderPodium();
                renderClassTable();
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        function renderPersonal() {
            if (!myIdentifier) return;

            const myIndex = myGlobalData.findIndex(s => s.nama_siswa.toLowerCase() === myIdentifier.toLowerCase());
            const myData = myGlobalData[myIndex];

            if (!myData) {
                document.getElementById('rataNum').innerText = "-";
                return;
            }

            const color = getDynamicColor(myData.average);
            const rataEl = document.getElementById('rataNum');
            rataEl.innerText = myData.average.toFixed(2);
            rataEl.style.color = color;
            rataEl.style.textShadow = `0 0 15px ${color}`;

            const ucapanEl = document.getElementById('ucapanText');
            ucapanEl.style.color = color;

            if (myData.average >= 80) ucapanEl.innerText = "dinginn ah di puncak🥶";
            else if (myData.average >= 75) ucapanEl.innerText = "pass KKM eyyy, hore";
            else if (myData.average >= 70) ucapanEl.innerText = "yah tipis";
            else if (myData.average >= 60) ucapanEl.innerText = "lumayann lahh sakie ma";
            else if (myData.average >= 50) ucapanEl.innerText = "gaoaoa, trs semangat";
            else ucapanEl.innerText = "gapapa dibawah 50, yang penting jujur.";

            document.getElementById('peringkat').innerHTML =
                `Peringkat <span style="color:${color}; font-size:1.3em; font-weight:bold;">#${myIndex + 1}</span>`;

            const tbody = document.getElementById('personalTableBody');
            tbody.innerHTML = "";
            let no = 1;
            for (let key in MAPEL_CONFIG) {
                const val = parseFloat(myData[key]);
                const isAda = !isNaN(val);
                const displayVal = isAda ? val.toFixed(2) : "-";
                const textColor = isAda ? getDynamicColor(val) : "#fff";

                tbody.innerHTML += `
                    <tr>
                        <td>${no++}</td>
                        <td style="text-align:left;">${MAPEL_CONFIG[key]}</td>
                        <td style="font-weight:bold; font-size:16px; color:${textColor}; text-shadow:0 0 8px ${textColor};">
                            ${displayVal}
                        </td>
                        <td>${isAda ? (val >= KKM ? '✅' : '❌') : '-'}</td>
                    </tr>`;
            }
        }

        function renderPodium() {
            const top3 = document.getElementById('podiumTop3');
            const rest = document.getElementById('podiumRest');
            top3.innerHTML = "";
            rest.innerHTML = "";

            const makePodium = (siswa, rank, cls) => {
                const color = getDynamicColor(siswa.average);
                const userId = avatarMap[siswa.nama_siswa.toLowerCase()];
                const imgUrl = userId
                    ? supabase.storage.from('avatars').getPublicUrl(String(userId) + '.jpg').data.publicUrl
                    : '../icons/profpicture.png';
                return `
                    <div class="podium ${cls}">
                        <img src="${imgUrl}" class="pp-top"
                             onerror="this.src='../icons/profpicture.png'">
                        <div style="font-weight:bold; margin-top:5px; font-size:13px;">${siswa.nama_siswa}</div>
                        <div style="font-size:14px; margin-top:2px; color:${color}; font-weight:bold; text-shadow:0 0 5px ${color};">
                            ${siswa.average.toFixed(2)}
                        </div>
                        <div style="font-size:20px; font-weight:900; opacity:0.3; position:absolute; bottom:5px; left:50%; transform:translateX(-50%);">${rank}</div>
                    </div>`;
            };

            if (globalData[1]) top3.innerHTML += makePodium(globalData[1], 2, 'p2');
            if (globalData[0]) top3.innerHTML += makePodium(globalData[0], 1, 'p1');
            if (globalData[2]) top3.innerHTML += makePodium(globalData[2], 3, 'p3');

            for (let i = 3; i < 15; i++) {
                if (globalData[i]) rest.innerHTML += makePodium(globalData[i], i + 1, 'pd');
            }
        }

        function renderClassTable() {
            const mapelKey = document.getElementById('mapelSelector').value;
            const tbody = document.getElementById('classTableBody');
            tbody.innerHTML = '';

            const sorted = [...globalData].sort((a, b) => (parseFloat(b[mapelKey]) || 0) - (parseFloat(a[mapelKey]) || 0));

            sorted.forEach((siswa, i) => {
                const val = parseFloat(siswa[mapelKey]);
                const displayVal = !isNaN(val) ? val.toFixed(2) : "-";
                const color = !isNaN(val) ? getDynamicColor(val) : "#fff";

                const tr = document.createElement('tr');
                if (myIdentifier && siswa.nama_siswa.toLowerCase() === myIdentifier.toLowerCase()) {
                    tr.style.cssText = "background:rgba(0,234,255,0.15); font-weight:bold; border-left:3px solid #00eaff;";
                }
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${siswa.nama_siswa}</td>
                    <td style="font-weight:bold; color:${color}; text-shadow:0 0 5px ${color};">${displayVal}</td>`;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>

</html>
