<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="flashcards">Flashcard • E-learning Nizam</title>
    <!-- Script urutan wajib sesuai arsitektur proyek -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js?v=20260619" defer></script>
    <script src="../js/ctx-menu.js?v=20260619"></script>
    <script src="../js/ui-components.js?v=20260619" defer></script>
    <script src="../js/sidebar.js?v=20260619"></script>
    <script src="../js/lang.js?v=20260619"></script>
    <script src="../js/basicfeat.js?v=20260619"></script>
    <script src="../js/show-popup.js?v=20260619"></script>
    <script src="../js/auth.js?v=20260619" defer></script>
    <script src="../js/activity.js?v=20260619" defer></script>
    <script src="../js/visitor.js?v=20260619" defer></script>
    <script src="../js/theme.js?v=20260619"></script>
    <script src="../js/toast.js?v=20260619"></script>
    <script src="../js/bottom-nav.js?v=20260619"></script>
    <script src="../js/system-notice.js?v=20260619"></script>
    <link rel="stylesheet" href="../css/styleasli.css?v=20260619">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="../icons/checklist.png" type="image/png">
</head>

<body>

    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">
        <!-- ===== LEFT SECTION: Interactive Flashcard View ===== -->
        <div class="left-section">
            <div class="glow">
                <h1>
                    <i class="fa-solid fa-clone" style="font-size: 26px;"></i>
                    <span data-i18n="flashcards">Flashcard</span>
                </h1>
            </div>

            <!-- Subject Header Info -->
            <div id="subjectInfoCard" class="daily-card-final glass-card-effect" style="margin-bottom: 25px; padding: 20px; display: none;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div id="subjectIconContainer" style="width: 50px; height: 50px; border-radius: 50%; background: rgba(0, 234, 255, 0.1); border: 2px solid var(--accent, #00eaff); display: flex; align-items: center; justify-content: center;">
                        <i id="subjectIcon" class="fa-solid fa-book" style="color: var(--accent, #00eaff); font-size: 20px;"></i>
                    </div>
                    <div style="flex: 1;">
                        <h3 id="subjectTitleName" style="margin: 0; font-size: 18px; color: #fff;">...</h3>
                        <span id="subjectCardsCount" style="color: #aaa; font-size: 13px;">0 Cards</span>
                    </div>
                    <button id="backBtn" class="btn-back" style="display: none; padding: 8px 15px; font-size: 12px; margin: 0; align-self: center;">
                        <i class="fa-solid fa-arrow-left"></i> <span data-i18n="back">Kembali</span>
                    </button>
                </div>
            </div>

            <!-- Flashcard Display Area -->
            <div id="flashcardView" style="display: none;">
                <div class="flashcard-container">
                    <div class="flashcard-wrapper" id="flashcardWrapper">
                        <!-- Sisi Depan -->
                        <div class="flashcard-front">
                            <div class="flashcard-content-text" id="frontText">...</div>
                            <div class="flashcard-hint" data-i18n="flip_hint">Klik kartu untuk membalikkan</div>
                        </div>
                        <!-- Sisi Belakang -->
                        <div class="flashcard-back">
                            <div class="flashcard-content-text" id="backText">...</div>
                            <div class="flashcard-hint" data-i18n="flip_hint">Klik kartu untuk membalikkan</div>
                        </div>
                    </div>
                </div>

                <!-- Navigation Controls -->
                <div class="flashcard-nav">
                    <button class="flashcard-btn" id="prevBtn">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <span class="flashcard-counter" id="cardCounter">0 / 0</span>
                    <button class="flashcard-btn" id="nextBtn">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>

                <!-- Keyboard shortcuts info -->
                <div style="text-align: center; margin-top: 30px; opacity: 0.5; font-size: 11px;">
                    <i class="fa-solid fa-keyboard"></i> Shortcut: 
                    <kbd style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">Space</kbd> Flip · 
                    <kbd style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">&larr;</kbd> Prev · 
                    <kbd style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">&rarr;</kbd> Next
                </div>
            </div>

            <!-- Empty / Selection placeholder -->
            <div id="hubPlaceholder" class="daily-card-final glass-card-effect" style="margin-bottom: 25px; padding: 40px; text-align: center;">
                <i class="fa-solid fa-layer-group animate-pulse" style="font-size: 3rem; color: var(--accent, #00eaff); margin-bottom: 15px; display: inline-block;"></i>
                <h3 data-i18n="flashcard_list">Daftar Flashcard</h3>
                <p style="opacity: 0.7; font-size: 14px; margin-top: 10px;">Pilih mata pelajaran di panel samping kanan buat mulai belajar pake flashcard wkwk</p>
            </div>
        </div>

        <!-- ===== RIGHT SECTION: Subject list & Admin panels ===== -->
        <div class="right-section">
            <!-- Subject filter selection chips -->
            <div class="filter-group-wrapper" style="margin-bottom: 20px;">
                <div class="filter-slider-bg" style="width: 100%; border-radius: 12px; height: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px;">
                    <span style="font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;">Mata Pelajaran</span>
                    <div id="subjectListChips" style="display: flex; flex-direction: column; gap: 8px;">
                        <!-- Will be populated by JS -->
                        <div class="skeleton" style="width: 100%; height: 40px; border-radius: 8px;"></div>
                        <div class="skeleton" style="width: 100%; height: 40px; border-radius: 8px;"></div>
                    </div>
                </div>
            </div>

            <!-- Admin control section (visible only to admins) -->
            <div id="adminPanel" class="daily-card-final glass-card-effect" style="margin-bottom: 25px; padding: 20px; display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0; font-size: 16px; color: #ffd700;"><i class="fa-solid fa-screwdriver-wrench"></i> Manajemen Flashcard</h3>
                    <button class="hide-desk" id="addCardBtn" style="padding: 6px 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; box-shadow: 0 0 10px rgba(0, 234, 255, 0.2);">
                        <i class="fa-solid fa-plus"></i> <span data-i18n="add_flashcard">Tambah</span>
                    </button>
                </div>
                <div class="flashcards-admin-grid" id="adminCardsGrid">
                    <!-- Cards will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Script flashcards logic -->
    <script src="../js/flashcards.js?v=20260619" defer></script>
</body>

</html>
