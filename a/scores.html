<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Nilai Ujian • E-Learning Nizam</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js" defer></script>
    <script src="../js/ctx-menu.js"></script>
    <script src="../js/ui-components.js" defer></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/lang.js"></script>
    <script src="../js/basicfeat.js"></script>
    <script src="../js/show-popup.js"></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/visitor.js" defer></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/bottom-nav.js"></script>
    <script src="../js/system-notice.js"></script>
    <link rel="stylesheet" href="../css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" id="pageIcon" href="../icons/app-icon.png" type="image/png">

    <style>
        :root {
            --accent: #00eaff;
            --glass: rgba(15, 20, 30, 0.85);
            --border: rgba(255, 255, 255, 0.12);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .hero-section {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        #pp {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(0, 234, 255, 0.3);
            background: #111;
        }

        .hero-info h1 {
            font-size: 28px;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #fff, #00eaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-info p {
            font-size: 16px;
            opacity: 0.7;
            margin: 0;
        }

        .stat-badge {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 100px;
        }

        .stat-badge .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 5px;
        }

        .stat-badge .value {
            font-size: 24px;
            font-weight: 800;
        }

        .main-content {
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        .modern-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .modern-table th {
            text-align: left;
            padding: 10px 15px;
            font-size: 13px;
            text-transform: uppercase;
            opacity: 0.5;
            font-weight: 600;
        }

        .modern-table tr:not(thead tr) {
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }

        .modern-table tr:not(thead tr):hover {
            background: rgba(255, 255, 255, 0.07);
            transform: scale(1.01);
        }

        .modern-table td {
            padding: 12px 15px;
        }

        .modern-table td:first-child { border-radius: 10px 0 0 10px; }
        .modern-table td:last-child { border-radius: 0 10px 10px 0; }

        .score-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            background: rgba(0, 234, 255, 0.1);
            border: 1px solid rgba(0, 234, 255, 0.2);
        }

        .podium-section {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            padding: 40px 0 20px;
            margin-top: 20px;
        }

        .podium-box {
            flex: 1;
            text-align: center;
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 45px 10px 15px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .podium-box:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.06); }

        .p-rank {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            padding: 3px;
            background: #111;
            animation: float 3s ease-in-out infinite;
        }

        .p-rank img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
        }

        .p1 { height: 200px; border-color: gold; background: rgba(255, 215, 0, 0.05); }
        .p1 .p-rank { border: 2px solid gold; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .p1 .p-rank::after { content: '👑'; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 20px; }
        .p2 { height: 160px; }
        .p3 { height: 140px; }

        .p-name { font-size: 13px; font-weight: 700; margin-top: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .p-score { font-size: 16px; font-weight: 800; color: var(--accent); }
        .p-num { font-size: 24px; font-weight: 900; opacity: 0.1; position: absolute; bottom: 5px; right: 45%; }

        @keyframes float {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -10px); }
        }

        .leaderboard-list {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .leader-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .leader-item:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.06); }
        .leader-item img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.2); }

        .select-wrapper { position: relative; margin-bottom: 20px; }
        .mapel-select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            appearance: none;
            cursor: pointer;
            font-size: 15px;
        }

        .select-wrapper::after {
            content: '\f078';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            pointer-events: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; pointer-events: auto; }
        .modal-content {
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-content { transform: translateY(0); opacity: 1; }
        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 24px; color: white;
            opacity: 0.5; cursor: pointer;
            transition: 0.2s; z-index: 10;
        }

        .close-modal:hover { opacity: 1; }

        .privacy-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 15px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-switch { position: relative; width: 44px; height: 22px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: rgba(255, 255, 255, 0.2); border-radius: 34px; transition: .3s; }
        .toggle-slider:before {
            position: absolute; content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background: white; transition: .3s; border-radius: 50%;
        }

        input:checked + .toggle-slider { background: var(--accent); }
        input:checked + .toggle-slider:before { transform: translateX(22px); }

        .fab-container { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 15px; z-index: 999; }
        .fab-admin {
            width: 55px; height: 55px;
            background: var(--accent); color: #000;
            border-radius: 50%; display: none;
            justify-content: center; align-items: center;
            font-size: 24px; box-shadow: 0 4px 20px rgba(0, 234, 255, 0.4);
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .fab-admin.secondary { background: rgba(255, 255, 255, 0.1); color: #fff; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .fab-admin.active { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
        .fab-admin:hover { transform: scale(1.1) rotate(90deg); }

        .config-list { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        .config-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.05); padding: 12px 15px;
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-save-config {
            width: 100%; margin-top: 25px; padding: 15px;
            border-radius: 12px; border: none;
            background: var(--accent); color: #000;
            font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div id="scoreModal" class="modal-overlay" onclick="closeScoreModal(event)">
        <div class="glass-card modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeScoreModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="fab-container">
        <div id="viewAllFab" class="fab-admin secondary" onclick="toggleViewAll()" title="Lihat Semua Mapel"><i class="fa-solid fa-eye"></i></div>
        <div id="adminFab" class="fab-admin" onclick="openAdminConfig()" title="Atur Mapel"><i class="fa-solid fa-gear"></i></div>
    </div>

    <div id="adminModal" class="modal-overlay" onclick="closeAdminModal(event)">
        <div class="glass-card modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeAdminModal()">&times;</span>
            <h2 style="margin-bottom: 5px;"><i class="fa-solid fa-sliders"></i> Atur Mapel</h2>
            <p style="opacity: 0.6; font-size: 13px; margin-bottom: 20px;">Pilih mapel yang ingin <b>DISEMBUNYIKAN</b>.</p>
            <div id="adminConfigList" class="config-list"></div>
            <button class="btn-save-config" onclick="saveAdminConfig()"><i class="fa-solid fa-save"></i> Simpan Konfigurasi</button>
        </div>
    </div>

    <div class="main-content">
        <div class="left-section">
            <h1 id="headerTitle" class="glow">Nilai Ujian</h1>
            <p id="leaderboardDesc" style="opacity: 0.6; margin-top: 5px; margin-bottom: 20px;">Ranking Berdasarkan Rata-Rata Nilai</p>

            <div class="glass-card">
                <div class="hero-section">
                    <img id="pp" src="">
                    <div class="hero-info">
                        <p id="uname" style="color:var(--accent); font-weight:600; font-size:14px;">@username</p>
                        <h1 id="name">Loading...</h1>
                        <p id="ucapanText"></p>
                    </div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 10px; justify-content: center;">
                    <div class="stat-badge"><span class="label">Rata-Rata</span><span class="value" id="rataNum">-</span></div>
                    <div class="stat-badge"><span class="label">Peringkat</span><span class="value" id="peringkatNum">-</span></div>
                </div>

                <!-- <div class="privacy-box">
                    <div style="display: flex; align-items: center; gap: 10px;"><i class="fa-solid fa-eye-slash" style="opacity: 0.7;"></i><div><div style="font-size: 13px; font-weight: 700;">Privasi Nilai</div><div style="font-size: 11px; opacity: 0.6;">Sembunyikan rincian dari orang lain</div></div></div>
                    <label class="toggle-switch"><input type="checkbox" id="privacyToggle" onchange="togglePrivacy(this.checked)"><span class="toggle-slider"></span></label>
                </div> -->
            </div>

            <div class="glass-card">
                <h3 style="margin-bottom: 20px;"><i class="fa-solid fa-list-ol"></i> Rincian Nilai Pribadi</h3>
                <table class="modern-table"><thead><tr><th>Mapel</th><th style="text-align: center;">Nilai</th><th style="text-align: center;">KKM</th></tr></thead><tbody id="personalTableBody"></tbody></table>
            </div>
        </div>

        <div class="right-section">
            <div class="glass-card">
                <h3 style="margin-bottom: 10px; color:var(--accent);"><i class="fa-solid fa-trophy"></i> Top 15 Leaderboard</h3>
                <div class="podium-section" id="podiumTop3"></div>
                <div class="leaderboard-list" id="podiumRest"></div>
            </div>

            <div class="glass-card">
                <h3 style="margin-bottom: 15px;"><i class="fa-solid fa-users"></i> Nilai Kelas</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="select-wrapper"><select id="classSelector" class="mapel-select" onchange="loadData()"></select></div>
                    <div class="select-wrapper"><select id="mapelSelector" class="mapel-select" onchange="renderClassTable()"></select></div>
                </div>
                <div class="select-wrapper"><select id="sortSelector" class="mapel-select" onchange="renderClassTable()"><option value="nilai">Urutkan: Nilai Tertinggi</option><option value="nama">Urutkan: Nama (A-Z)</option></select></div>
                <table class="modern-table"><thead><tr><th style="width: 40px;">#</th><th>Nama Siswa</th><th style="text-align: right;">Nilai</th></tr></thead><tbody id="classTableBody"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const TEST_CONFIG = {
            'psts': { title: 'Nilai PSTS', table: 'nilai_psts', icon: 'fa-clipboard-check' },
            'psasi': { title: 'Nilai PSASI', table: 'nilai_psasi', icon: 'fa-file-invoice' },
            'psat': { title: 'Nilai PSAT', table: 'nilai_psat', icon: 'fa-file-invoice' }
        };
        const MAPEL_CONFIG = { pabp: 'PABP', pp: 'PP', bindo: 'B. Indonesia', bing: 'B. Inggris', mtk: 'Matematika', sejarah: 'Sejarah', bjepang: 'B. Jepang', bsunda: 'B. Sunda', senibudaya: 'Seni Budaya', informatika: 'Informatika', pjok: 'PJOK', proipas: 'Proipas', dasprog1: 'DASPROGRPL 1', dasprog2: 'DASPROGRPL 2', dasprog3: 'DASPROGRPL 3' };
        const KKM = 75;
        let globalData = [], myGlobalData = [], avatarMap = {}, nicknameMap = {}, currentTestId = 'psts', currentHiddenSubjects = [], isAdminViewAll = false;
        const localUser = JSON.parse(localStorage.getItem("user"));
        const myIdentifier = localUser ? (localUser.full_name || localUser.nickname) : null;
        const myNickname = localUser ? localUser.nickname : null;

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const testId = urlParams.get('id');
            if (testId && TEST_CONFIG[testId]) currentTestId = testId;
            const config = TEST_CONFIG[currentTestId];
            document.title = `${config.title} • E-Learning Nizam`;
            document.getElementById('headerTitle').innerHTML = `<i class="fa-solid ${config.icon}"></i> ${config.title}`;

            supabase.from('classes').select('id, name').order('id').then(({ data }) => {
                if (data) {
                    const sel = document.getElementById('classSelector');
                    let html = '';
                    data.forEach(c => html += `<option value="${c.id}" ${c.id == getEffectiveClassId() ? 'selected' : ''}>${c.name}</option>`);
                    sel.innerHTML = html;
                }
            });

            updateProfileUI(localUser);
            await loadData();
        });

        function getDisplayName(nama) {
            if (!nama) return '-';
            return nicknameMap[nama.toLowerCase()] || nama;
        }

        function updateProfileUI(user) {
            if (!user) return;
            document.getElementById('name').innerText = user.nickname || user.full_name;
            document.getElementById('uname').innerText = `@${user.username || 'user'}`;
            document.getElementById('pp').src = user.avatar_url || '../icons/profpicture.png';
            if (user.role === 'super_admin') {
                document.getElementById('adminFab').style.display = 'flex';
                document.getElementById('viewAllFab').style.display = 'flex';
            }
        }

        async function loadData() {
            if (!localUser) return;
            const mainContent = document.querySelector('.main-content');
            mainContent.style.opacity = '0';
            const effectiveClassId = document.getElementById('classSelector').value || getEffectiveClassId();
            const tableName = TEST_CONFIG[currentTestId].table;
            const cacheKey = `scores_cache_${currentTestId}_${effectiveClassId}`;

            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    globalData = parsed.globalData; myGlobalData = parsed.myGlobalData; avatarMap = parsed.avatarMap; nicknameMap = parsed.nicknameMap || {}; currentHiddenSubjects = parsed.currentHiddenSubjects || [];
                    renderAll(); mainContent.style.opacity = '1';
                } catch (e) {}
            }

            try {
                const [nRes, uRes, mRes, cRes] = await Promise.all([
                    supabase.from(tableName).select('*, is_private').eq('class_id', effectiveClassId),
                    supabase.from('users').select('id, full_name, nickname').eq('class_id', effectiveClassId),
                    supabase.from(tableName).select('*, is_private').eq('class_id', localUser.class_id),
                    supabase.from('nilai_config').select('hidden_subjects').eq('test_id', currentTestId).eq('class_id', effectiveClassId).maybeSingle()
                ]);
                if (nRes.error) throw nRes.error;
                currentHiddenSubjects = cRes.data ? cRes.data.hidden_subjects : [];
                const newAvatarMap = {}, newNicknameMap = {};
                uRes.data?.forEach(u => {
                    if (u.full_name) { newAvatarMap[u.full_name.toLowerCase()] = u.id; newNicknameMap[u.full_name.toLowerCase()] = u.nickname; }
                    if (u.nickname) { newAvatarMap[u.nickname.toLowerCase()] = u.id; newNicknameMap[u.nickname.toLowerCase()] = u.nickname; }
                });
                const process = (s) => {
                    let t = 0, c = 0;
                    for (let k in MAPEL_CONFIG) {
                        if (!isAdminViewAll && currentHiddenSubjects.includes(k)) continue;
                        const v = parseFloat(s[k]); if (!isNaN(v)) { t += v; c++; }
                    }
                    return { ...s, average: c > 0 ? parseFloat((t / c).toFixed(2)) : 0 };
                };
                globalData = nRes.data.map(process).sort((a, b) => (b.average - a.average) || a.nama_siswa.localeCompare(b.nama_siswa));
                myGlobalData = (mRes.data || []).map(process).sort((a, b) => (b.average - a.average) || a.nama_siswa.localeCompare(b.nama_siswa));
                avatarMap = newAvatarMap; nicknameMap = newNicknameMap;
                localStorage.setItem(cacheKey, JSON.stringify({ globalData, myGlobalData, avatarMap, nicknameMap, currentHiddenSubjects }));
                renderAll(); mainContent.style.opacity = '1';
            } catch (err) { console.error(err); mainContent.style.opacity = '1'; }
        }

        function renderAll() { renderMapelSelector(); renderPersonal(); renderPodium(); renderClassTable(); }

        function renderMapelSelector() {
            const sel = document.getElementById('mapelSelector');
            const prevVal = sel.value; let html = '';
            for (let k in MAPEL_CONFIG) { if (!isAdminViewAll && currentHiddenSubjects.includes(k)) continue; html += `<option value="${k}">${MAPEL_CONFIG[k]}</option>`; }
            sel.innerHTML = html;
            if (prevVal && sel.querySelector(`option[value="${prevVal}"]`)) sel.value = prevVal;
        }

        function renderPersonal() {
            if (!myIdentifier) return;
            let idx = myGlobalData.findIndex(s => s.nama_siswa.toLowerCase() === myIdentifier.toLowerCase());
            if (idx === -1 && myNickname) idx = myGlobalData.findIndex(s => s.nama_siswa.toLowerCase() === myNickname.toLowerCase());
            const data = myGlobalData[idx]; if (!data) return;
            document.getElementById('name').innerText = getDisplayName(data.nama_siswa);
            // document.getElementById('privacyToggle').checked = !!data.is_private;
            const color = getDynamicColor(data.average);
            document.getElementById('rataNum').innerText = data.average.toFixed(2); document.getElementById('rataNum').style.color = color;
            document.getElementById('peringkatNum').innerText = `#${idx + 1}`; document.getElementById('peringkatNum').style.color = color;
            const ucapan = document.getElementById('ucapanText'); ucapan.style.color = color;
            if (data.average >= 85) ucapan.innerText = "dinginn ah di puncak🥶";
            else if (data.average >= 75) ucapan.innerText = "pass KKM aman laa";
            else if (data.average >= 70) ucapan.innerText = "yah dikit lagi KKM";
            else ucapan.innerText = "gapapa, semangat trus";
            const tbody = document.getElementById('personalTableBody'); tbody.innerHTML = "";
            for (let k in MAPEL_CONFIG) {
                if (!isAdminViewAll && currentHiddenSubjects.includes(k)) continue;
                const v = parseFloat(data[k]); const isAda = !isNaN(v); const cV = isAda ? getDynamicColor(v) : "#fff";
                tbody.innerHTML += `<tr><td style="font-weight:600;">${MAPEL_CONFIG[k]}</td><td style="text-align:center;"><span class="score-pill" style="color:${cV}; border-color:${cV}33; background:${cV}11">${isAda ? v.toFixed(2) : '-'}</span></td><td style="text-align:center;">${isAda ? (v >= KKM ? '<i class="fa-solid fa-check" style="color:#2ecc71"></i>' : '<i class="fa-solid fa-xmark" style="color:#e74c3c"></i>') : '-'}</td></tr>`;
            }
        }

        function renderPodium() {
            const t3 = document.getElementById('podiumTop3'), rs = document.getElementById('podiumRest');
            t3.innerHTML = ""; rs.innerHTML = "";
            const mkP = (s, r, c) => {
                const uid = avatarMap[s.nama_siswa.toLowerCase()];
                const url = uid ? supabase.storage.from('avatars').getPublicUrl(uid + '.jpg').data.publicUrl : '../icons/profpicture.png';
                return `<div class="podium-box ${c}" onclick="showStudentScores('${s.nama_siswa}')" style="cursor:pointer;"><div class="p-rank"><img src="${url}" onerror="this.src='../icons/profpicture.png'"></div><div class="p-name">${getDisplayName(s.nama_siswa)}</div><div class="p-score">${s.average.toFixed(2)}</div><div class="p-num">${r}</div></div>`;
            };
            if (globalData[1]) t3.innerHTML += mkP(globalData[1], 2, 'p2');
            if (globalData[0]) t3.innerHTML += mkP(globalData[0], 1, 'p1');
            if (globalData[2]) t3.innerHTML += mkP(globalData[2], 3, 'p3');
            for (let i = 3; i < 15; i++) {
                if (globalData[i]) {
                    const uid = avatarMap[globalData[i].nama_siswa.toLowerCase()];
                    const url = uid ? supabase.storage.from('avatars').getPublicUrl(uid + '.jpg').data.publicUrl : '../icons/profpicture.png';
                    rs.innerHTML += `<div class="leader-item" onclick="showStudentScores('${globalData[i].nama_siswa}')" style="cursor:pointer;"><span style="width:20px; font-weight:900; opacity:0.3;">${i + 1}</span><img src="${url}" onerror="this.src='../icons/profpicture.png'"><div style="flex:1; overflow:hidden;"><div style="font-size:12px; font-weight:700; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${getDisplayName(globalData[i].nama_siswa)}</div><div style="font-size:11px; color:var(--accent); font-weight:800;">${globalData[i].average.toFixed(2)}</div></div></div>`;
                }
            }
        }

        function renderClassTable() {
            const k = document.getElementById('mapelSelector').value, sort = document.getElementById('sortSelector').value, tbody = document.getElementById('classTableBody');
            if (!tbody) return;
            tbody.innerHTML = ''; let sorted = [...globalData];
            if (sort === 'nama') sorted.sort((a, b) => a.nama_siswa.localeCompare(b.nama_siswa));
            else sorted.sort((a, b) => (parseFloat(b[k]) || 0) - (parseFloat(a[k]) || 0) || a.nama_siswa.localeCompare(b.nama_siswa));
            sorted.forEach((s, i) => {
                const v = parseFloat(s[k]); const dV = !isNaN(v) ? v.toFixed(2) : "-"; const cV = !isNaN(v) ? getDynamicColor(v) : "#fff";
                const tr = document.createElement('tr'); tr.style.cursor = "pointer"; tr.onclick = () => showStudentScores(s.nama_siswa);
                if (myIdentifier && (s.nama_siswa.toLowerCase() === myIdentifier.toLowerCase() || (myNickname && s.nama_siswa.toLowerCase() === myNickname.toLowerCase()))) { tr.style.background = "rgba(0, 234, 255, 0.15)"; tr.style.boxShadow = "inset 4px 0 0 var(--accent)"; }
                tr.innerHTML = `<td style="font-weight:bold; opacity:0.5;">${sort === 'nama' ? '-' : i + 1}</td><td style="font-weight:600; display:flex; align-items:center; gap:8px;">${getDisplayName(s.nama_siswa)}${s.is_private ? '<i class="fa-solid fa-eye-slash" style="font-size:10px; opacity:0.3;"></i>' : ''}</td><td style="text-align:right;"><span class="score-pill" style="color:${cV}; border-color:${cV}33; background:${cV}11">${dV}</span></td>`;
                tbody.appendChild(tr);
            });
        }

        function showStudentScores(nama) {
            const s = globalData.find(x => x.nama_siswa.toLowerCase() === nama.toLowerCase()); if (!s) return;
            const isMe = (myIdentifier && nama.toLowerCase() === myIdentifier.toLowerCase()) || (myNickname && nama.toLowerCase() === myNickname.toLowerCase());
            let html = ""; const color = getDynamicColor(s.average);
            if (s.is_private && !isMe && !isAdminViewAll) html = `<div style="text-align:center; padding: 30px 10px;"><i class="fa-solid fa-eye-slash" style="font-size: 50px; opacity: 0.2; margin-bottom: 20px;"></i><h2 style="margin-bottom: 10px;">Nilai Tersembunyi</h2><p style="opacity:0.6;">Siswa ini mengaktifkan mode privasi.</p></div>`;
            else {
                html = `<div style="text-align:left;"><h2 style="color:${color}; margin-bottom:5px; font-size:24px;">${getDisplayName(s.nama_siswa)}</h2><p style="opacity:0.7; margin-bottom:25px;">Rata-Rata: <b style="color:${color}">${s.average.toFixed(2)}</b></p><table class="modern-table"><thead><tr><th>Mapel</th><th style="text-align:center;">Nilai</th><th style="text-align:center;">KKM</th></tr></thead><tbody>`;
                for (let k in MAPEL_CONFIG) { if (!isAdminViewAll && currentHiddenSubjects.includes(k)) continue; const v = parseFloat(s[k]); const isAda = !isNaN(v); const cV = isAda ? getDynamicColor(v) : "#fff"; html += `<tr><td style="font-weight:600;">${MAPEL_CONFIG[k]}</td><td style="text-align:center;"><span class="score-pill" style="color:${cV}; border-color:${cV}33; background:${cV}11">${isAda ? v.toFixed(2) : '-'}</span></td><td style="text-align:center;">${isAda ? (v >= KKM ? '✅' : '❌') : '-'}</td></tr>`; }
                html += `</tbody></table></div>`;
            }
            document.getElementById('modalBody').innerHTML = html; document.getElementById('scoreModal').classList.add('active'); document.body.style.overflow = 'hidden'; window.history.pushState({ modalOpen: true }, "");
        }

        function closeScoreModal(e) { if (e && e.target !== document.getElementById('scoreModal')) return; document.getElementById('scoreModal').classList.remove('active'); document.body.style.overflow = ''; if (window.history.state?.modalOpen) window.history.back(); }

        function toggleViewAll() { isAdminViewAll = !isAdminViewAll; const fab = document.getElementById('viewAllFab'); fab.classList.toggle('active', isAdminViewAll); fab.innerHTML = isAdminViewAll ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye"></i>'; reprocess(); renderAll(); }

        function reprocess() {
            const proc = (s) => {
                let t = 0, c = 0;
                for (let k in MAPEL_CONFIG) { if (!isAdminViewAll && currentHiddenSubjects.includes(k)) continue; const v = parseFloat(s[k]); if (!isNaN(v)) { t += v; c++; } }
                return { ...s, average: c > 0 ? parseFloat((t / c).toFixed(2)) : 0 };
            };
            globalData = globalData.map(proc).sort((a, b) => (b.average - a.average) || a.nama_siswa.localeCompare(b.nama_siswa));
            myGlobalData = myGlobalData.map(proc).sort((a, b) => (b.average - a.average) || a.nama_siswa.localeCompare(b.nama_siswa));
        }

        function openAdminConfig() {
            const list = document.getElementById('adminConfigList'); let html = '';
            for (let k in MAPEL_CONFIG) { html += `<div class="config-item"><span>${MAPEL_CONFIG[k]}</span><label class="toggle-switch"><input type="checkbox" class="admin-subject-toggle" value="${k}" ${currentHiddenSubjects.includes(k) ? 'checked' : ''}><span class="toggle-slider"></span></label></div>`; }
            list.innerHTML = html; document.getElementById('adminModal').classList.add('active'); document.body.style.overflow = 'hidden'; window.history.pushState({ adminModal: true }, "");
        }

        function closeAdminModal(e) { if (e && e.target !== document.getElementById('adminModal')) return; document.getElementById('adminModal').classList.remove('active'); document.body.style.overflow = ''; if (window.history.state?.adminModal) window.history.back(); }

        async function saveAdminConfig() {
            const hidden = Array.from(document.querySelectorAll('.admin-subject-toggle:checked')).map(cb => cb.value);
            const classId = document.getElementById('classSelector').value || getEffectiveClassId();
            showToast('Menyimpan...', 'info');
            const { error } = await supabase.from('nilai_config').upsert({ test_id: currentTestId, class_id: classId, hidden_subjects: hidden }, { onConflict: 'test_id, class_id' });
            if (error) showToast('Gagal: ' + error.message, 'error'); else { showToast('Berhasil!', 'success'); closeAdminModal(); loadData(); }
        }

        async function togglePrivacy(isP) {
            showToast('Menyimpan...', 'info');
            const { error } = await supabase.from(TEST_CONFIG[currentTestId].table).update({ is_private: isP }).eq('nama_siswa', myIdentifier);
            if (error && myNickname) await supabase.from(TEST_CONFIG[currentTestId].table).update({ is_private: isP }).eq('nama_siswa', myNickname);
            showToast('Selesai!', 'success'); loadData();
        }

        function getDynamicColor(n) { n = parseFloat(n); if (isNaN(n)) return "#888"; if (n >= 90) return "#00eafe"; if (n >= 80) return "#00cec9"; if (n >= 75) return "#1abc9c"; if (n >= 70) return "#e67e22"; return "#ff4757"; }

        window.onpopstate = () => {
            const sM = document.getElementById('scoreModal'), aM = document.getElementById('adminModal');
            if (sM) sM.classList.remove('active'); if (aM) aM.classList.remove('active'); document.body.style.overflow = '';
        };
    </script>
</body>

</html>
