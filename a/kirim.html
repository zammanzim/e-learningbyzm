<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim File • E-Learning Nizam</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/basicfeat.js" defer></script>
    <script src="../js/sidebar.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <link rel="stylesheet" href="../css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .upload-card {
            max-width: 520px;
            margin: 2rem auto;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 2rem;
        }
        .upload-card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .upload-card h2 i { color: var(--accent, #00eaff); }

        .drop-zone {
            border: 2px dashed rgba(0,234,255,0.25);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: rgba(0,234,255,0.02);
            position: relative;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #00eaff;
            background: rgba(0,234,255,0.06);
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .drop-zone .dz-icon {
            font-size: 2rem;
            color: rgba(0,234,255,0.4);
            margin-bottom: .75rem;
        }
        .drop-zone .dz-text {
            font-size: .9rem;
            color: #666;
        }
        .drop-zone .dz-hint {
            font-size: .75rem;
            color: #444;
            margin-top: .4rem;
        }

        .file-preview {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: rgba(0,234,255,0.06);
            border: 1px solid rgba(0,234,255,0.2);
            border-radius: 10px;
            margin-top: 1rem;
        }
        .file-preview.show { display: flex; }
        .file-preview .fp-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: rgba(0,234,255,0.1);
            display: flex; align-items: center; justify-content: center;
            color: #00eaff; font-size: .9rem;
            flex-shrink: 0;
        }
        .file-preview .fp-info { flex: 1; min-width: 0; }
        .file-preview .fp-name {
            font-size: .85rem; font-weight: 600; color: #ddd;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .file-preview .fp-size { font-size: .75rem; color: #555; }
        .file-preview .fp-remove {
            background: none; border: none; color: #555;
            cursor: pointer; font-size: 1rem; padding: 4px;
            transition: color .15s;
        }
        .file-preview .fp-remove:hover { color: #ff4757; }

        .msg-input {
            width: 100%;
            margin-top: 1rem;
            padding: .75rem 1rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #ddd;
            font-size: .875rem;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            box-sizing: border-box;
            transition: border-color .2s;
        }
        .msg-input:focus {
            outline: none;
            border-color: rgba(0,234,255,0.3);
        }
        .msg-input::placeholder { color: #444; }

        .progress-wrap {
            display: none;
            margin-top: 1rem;
        }
        .progress-wrap.show { display: block; }
        .progress-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00eaff, #0070ff);
            border-radius: 3px;
            width: 0%;
            transition: width .3s ease;
        }
        .progress-label {
            font-size: .75rem;
            color: #555;
            margin-top: .4rem;
            text-align: right;
        }

        .btn-upload {
            width: 100%;
            margin-top: 1.25rem;
            padding: .85rem;
            background: var(--accent, #00eaff);
            color: #0a0a0c;
            border: none;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-upload:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-upload:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
        }

        .success-box {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem 1rem;
            gap: .75rem;
        }
        .success-box.show { display: flex; }
        .success-box .sc-icon {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(0,234,255,0.1);
            border: 2px solid rgba(0,234,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: #00eaff;
        }
        .success-box h3 { color: #fff; font-size: 1.1rem; margin: 0; }
        .success-box p { color: #666; font-size: .875rem; margin: 0; }
        .btn-again {
            margin-top: .5rem;
            padding: .6rem 1.4rem;
            border: 1px solid rgba(0,234,255,0.3);
            border-radius: 8px;
            background: none;
            color: #00eaff;
            font-size: .85rem;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-again:hover { background: rgba(0,234,255,0.08); }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">
        <div class="right-section" style="max-width:600px;margin:0 auto;">

            <div class="upload-card">
                <h2><i class="fa-solid fa-paper-plane"></i> Kirim File ke Guru</h2>

                <!-- Form upload -->
                <div id="uploadForm">
                    <div class="drop-zone" id="dropZone">
                        <input type="file" id="fileInput" accept="*/*">
                        <div class="dz-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                        <div class="dz-text">Klik atau seret file ke sini</div>
                        <div class="dz-hint">Semua format didukung · Maks. 200 MB</div>
                    </div>

                    <div class="file-preview" id="filePreview">
                        <div class="fp-icon"><i class="fa-solid fa-file" id="fpIconEl"></i></div>
                        <div class="fp-info">
                            <div class="fp-name" id="fpName"></div>
                            <div class="fp-size" id="fpSize"></div>
                        </div>
                        <button class="fp-remove" onclick="clearFile()" title="Hapus">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <textarea class="msg-input" id="msgInput"
                        placeholder="Pesan / keterangan (opsional)..."></textarea>

                    <div class="progress-wrap" id="progressWrap">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-label" id="progressLabel">0%</div>
                    </div>

                    <button class="btn-upload" id="btnUpload" onclick="doUpload()">
                        <i class="fa-solid fa-paper-plane"></i> Kirim
                    </button>
                </div>

                <!-- Sukses -->
                <div class="success-box" id="successBox">
                    <div class="sc-icon"><i class="fa-solid fa-check"></i></div>
                    <h3>File terkirim!</h3>
                    <p id="successMsg">File berhasil dikirim ke guru.</p>
                    <button class="btn-again" onclick="resetForm()">
                        <i class="fa-solid fa-plus" style="margin-right:6px;"></i>Kirim lagi
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        let selectedFile = null;

        // ── File icon helper ──────────────────────────────
        function getFileIcon(type, name) {
            const ext = name.split('.').pop().toLowerCase();
            if (type.startsWith('image/')) return 'fa-image';
            if (type.startsWith('video/')) return 'fa-film';
            if (type.startsWith('audio/')) return 'fa-music';
            if (['zip','rar','7z','tar','gz'].includes(ext)) return 'fa-file-zipper';
            if (['pdf'].includes(ext)) return 'fa-file-pdf';
            if (['doc','docx'].includes(ext)) return 'fa-file-word';
            if (['xls','xlsx'].includes(ext)) return 'fa-file-excel';
            if (['ppt','pptx'].includes(ext)) return 'fa-file-powerpoint';
            if (['js','ts','py','html','css','php','java','cpp','c'].includes(ext)) return 'fa-file-code';
            return 'fa-file';
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/(1024*1024)).toFixed(1) + ' MB';
        }

        // ── File input handler ────────────────────────────
        document.getElementById('fileInput').addEventListener('change', e => {
            if (e.target.files[0]) setFile(e.target.files[0]);
        });

        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
        });

        function setFile(file) {
            selectedFile = file;
            document.getElementById('fpName').textContent = file.name;
            document.getElementById('fpSize').textContent = formatSize(file.size);
            document.getElementById('fpIconEl').className = `fa-solid ${getFileIcon(file.type, file.name)}`;
            document.getElementById('filePreview').classList.add('show');
        }

        function clearFile() {
            selectedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('filePreview').classList.remove('show');
        }

        // ── Upload ────────────────────────────────────────
        async function doUpload() {
            if (!selectedFile) { showToast('Pilih file dulu!', 'error'); return; }

            const MAX = 200 * 1024 * 1024;
            if (selectedFile.size > MAX) { showToast('File terlalu besar (maks 200 MB)', 'error'); return; }

            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (!user) { showToast('Belum login!', 'error'); return; }

            const btn = document.getElementById('btnUpload');
            btn.disabled = true;
            document.getElementById('progressWrap').classList.add('show');

            try {
                // Buat path unik: userId/timestamp_namafile
                const ts       = Date.now();
                const safeName = selectedFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
                const filePath = `${user.id}/${ts}_${safeName}`;

                // Simulate progress (Supabase JS v2 tidak support progress event)
                let fakeProgress = 0;
                const progInterval = setInterval(() => {
                    fakeProgress = Math.min(fakeProgress + Math.random() * 15, 85);
                    setProgress(fakeProgress);
                }, 300);

                // Upload ke storage
                const { error: storageErr } = await supabase.storage
                    .from('transfers')
                    .upload(filePath, selectedFile, { upsert: false });

                clearInterval(progInterval);
                if (storageErr) throw storageErr;

                setProgress(95);

                // Simpan metadata ke DB
                const msg = document.getElementById('msgInput').value.trim();
                const { error: dbErr } = await supabase.from('file_transfers').insert({
                    user_id:        user.id,
                    uploader_name:  user.nickname || user.full_name || user.name,
                    uploader_class: user.class_name || String(user.class_id || ''),
                    file_name:      selectedFile.name,
                    file_path:      filePath,
                    file_size:      selectedFile.size,
                    file_type:      selectedFile.type || 'application/octet-stream',
                    message:        msg || null,
                });

                if (dbErr) throw dbErr;

                setProgress(100);
                setTimeout(() => {
                    document.getElementById('successMsg').textContent =
                        `"${selectedFile.name}" berhasil dikirim.`;
                    document.getElementById('uploadForm').style.display = 'none';
                    document.getElementById('successBox').classList.add('show');
                }, 400);

            } catch(err) {
                console.error(err);
                showToast('Gagal upload: ' + (err.message || err), 'error');
                btn.disabled = false;
                document.getElementById('progressWrap').classList.remove('show');
                setProgress(0);
            }
        }

        function setProgress(pct) {
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressLabel').textContent = Math.round(pct) + '%';
        }

        function resetForm() {
            clearFile();
            document.getElementById('msgInput').value = '';
            document.getElementById('progressWrap').classList.remove('show');
            setProgress(0);
            document.getElementById('btnUpload').disabled = false;
            document.getElementById('uploadForm').style.display = '';
            document.getElementById('successBox').classList.remove('show');
        }
    </script>
</body>
</html>
