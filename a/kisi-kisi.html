<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisi-Kisi PSTS • E-Learning Nizam</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js" defer></script>
    <script src="../js/ctx-menu.js"></script>
    <script src="../js/ui-components.js" defer></script>
    <script src="../js/sidebar.js"></script>
<script src="../js/lang.js"></script>
<script src="../js/basicfeat.js"></script>
<script src="../js/show-popup.js"></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/visitor.js" defer></script>
    <script src="../js/subject-manager.js" defer></script>
    <script src="../js/theme.js"></script>
<script src="../js/toast.js"></script><script src="../js/bottom-nav.js"></script>
    <script src="../js/system-notice.js"></script>
<link rel="stylesheet" href="../css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="icons/checklist.png" type="image/png">
</head>

<body>

    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">

        <!-- ===== LEFT SECTION ===== -->
        <div class="left-section">
            <div class="glow">
                <h1><i class="fa-solid fa-clipboard-list" style="font-size: 26px;"></i> Kisi-Kisi PSTS</h1>
            </div>

            <div class="daily-card-final" style="margin-bottom: 25px; padding: 20px;">
                
                <div id="kisiInfoList">
                    <p style="color:rgba(255,255,255,0.35); font-size:12px; font-style:italic; margin:0;">Memuat...</p>
                </div>
            </div>
        </div>

        <!-- ===== RIGHT SECTION ===== -->
        <div class="right-section">

            <!-- Announcements container — SubjectApp renders here, then kisi-kisi.js re-renders with day groups -->
            <div id="announcements" class="announcements">
                <!-- Skeleton loading -->
                <div class="sk-card">
                    <div class="skeleton sk-title"></div>
                    <div class="skeleton sk-text"></div>
                    <div class="skeleton sk-text short"></div>
                </div>
                <div class="sk-card">
                    <div class="skeleton sk-title"></div>
                    <div class="skeleton sk-text"></div>
                    <div class="skeleton sk-text short"></div>
                </div>
                <div class="sk-card">
                    <div class="skeleton sk-title"></div>
                    <div class="skeleton sk-text"></div>
                    <div class="skeleton sk-text short"></div>
                </div>
            </div>

            <!-- Admin FAB + controls injected here by SubjectApp.setupAdminControls() -->
            <div id="editControls"></div>
        </div>
    </div>

    <!-- kisi-kisi.js must load AFTER subject-manager.js — patches SubjectApp.renderAnnouncements -->
    <script src="../js/kisi-kisi.js" defer></script>

</body>

</html>
