<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisi-Kisi Ulangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-clients.js" defer></script>
    <script src="js/ui-components.js" defer></script>
    <script src="js/basicfeat.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/visitor.js" defer></script>
    <script src="js/subject-manager.js" defer></script>
    <link rel="stylesheet" href="css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="icons/checklist.png" type="image/png">

    <style>
        /* ===== Filter Bar ===== */
        .kisi-filter-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }

        .kisi-select-wrap {
            position: relative;
            flex: 1;
        }

        .kisi-select-wrap i {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            pointer-events: none;
        }

        #kisiFilter {
            width: 100%;
            padding: 10px 14px 10px 34px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            appearance: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        #kisiFilter:focus { outline: none; border-color: rgba(0,234,255,0.4); }
        #kisiFilter option { background: #0d1117; }

        /* ===== Status Badge ===== */
        .kisi-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .kisi-badge-besok {
            background: rgba(255, 71, 87, 0.2);
            color: #ff6b81;
            border: 1px solid rgba(255, 71, 87, 0.35);
        }

        .kisi-badge-kisi {
            background: rgba(255, 159, 67, 0.2);
            color: #ffa94d;
            border: 1px solid rgba(255, 159, 67, 0.35);
        }

        /* ===== Card left accent ===== */
        .course-card.kisi-is-besok {
            border-left: 4px solid #ff4757 !important;
            box-shadow: inset 4px 0 25px rgba(255, 71, 87, 0.07) !important;
        }

        .course-card.kisi-is-kisi {
            border-left: 4px solid #ff9f43 !important;
            box-shadow: inset 4px 0 25px rgba(255, 159, 67, 0.06) !important;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">
        <div class="left-section">
            <h2 id="welcomeText"></h2>
        </div>
        <div class="right-section">

            <!-- Filter dropdown -->
            <div class="kisi-filter-bar">
                <div class="kisi-select-wrap">
                    <i class="fa-solid fa-filter"></i>
                    <select id="kisiFilter" onchange="applyKisiFilter()">
                        <option value="all">Semua Pelajaran</option>
                    </select>
                </div>
            </div>

            <div id="announcements"></div>
            <div id="editControls"></div>
        </div>
    </div>

    <script src="js/kisi2.js" defer></script>

    <script type="module">
        SubjectApp.init(
            'kisikisi',
            '<h3><i class="fa-solid fa-file-lines"></i> Kisi-Kisi Ulangan</h3>',
            'Kisi-Kisi Ulangan',
            false
        );
    </script>
</body>

</html>
