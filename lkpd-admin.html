<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kelola LKPD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-clients.js" defer></script>
    <script src="js/ui-components.js" defer></script>
    <script src="js/basicfeat.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/visitor.js" defer></script>
    <link rel="stylesheet" href="css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">
        <div class="left-section">
            <div class="glow">
                <h1><i class="fa-solid fa-users-gear"></i> Kelola Kelompok</h1>
            </div>
            
            <div class="daily-card-final" style="margin-top: 20px; padding: 25px;">
                <h3 style="margin-bottom: 20px; color: #00eaff;"><i class="fa-solid fa-plus"></i> Set Pengerja Bab</h3>
                
                <div style="margin-bottom: 15px;">
                    <label class="form-label">Pilih Bab (ID)</label>
                    <input type="number" id="inputChapter" class="glass-input" placeholder="Contoh: 1" min="1">
                </div>

                <div style="margin-bottom: 15px;">
                    <label class="form-label">Nama Kelompok</label>
                    <input type="text" id="inputGroupName" class="glass-input" placeholder="Contoh: Kelompok 1 / Kelompok A">
                </div>

                <div style="margin-bottom: 20px;">
                    <label class="form-label">Anggota Kelompok (Pisahkan dengan tanda ;)</label>
                    <textarea id="inputMembers" class="glass-input" style="min-height: 100px;" placeholder="Contoh: Budi; Ani; Iwan"></textarea>
                    <small style="color: #888; font-size: 11px;">*Gunakan nickname yang sama dengan yang terdaftar di akun mereka.</small>
                </div>

                <button class="btn-glass-save" onclick="saveGroup()" style="width: 100%;">
                    <i class="fa-solid fa-floppy-disk"></i> SIMPAN PEMBAGIAN
                </button>
            </div>
        </div>

        <div class="right-section">
            <h3 style="margin-bottom: 15px;"><i class="fa-solid fa-list-ul"></i> Daftar Kelompok Saat Ini</h3>
            <div id="groupListContainer" class="announcements">
                </div>
        </div>
    </div>

    <script src="js/lkpd-admin-logic.js" defer></script>
</body>
</html>
