<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-clients.js" defer></script>
    <script src="js/ui-components.js" defer></script>
    <script src="js/basicfeat.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/visitor.js" defer></script>
    <script src="js/subject-manager.js" defer></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <link rel="stylesheet" href="css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="icons/announcements.png" type="image/png">
    <style>
        /* ── TIMELINE WRAPPER ── */
        .updates-timeline {
            position: relative;
            padding: 8px 0 40px 0;
        }

        .updates-timeline::before {
            content: '';
            position: absolute;
            left: 18px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom,
                rgba(0, 234, 255, 0.6) 0%,
                rgba(0, 234, 255, 0.15) 70%,
                transparent 100%);
        }

        /* ── SINGLE UPDATE CARD ── */
        .update-entry {
            position: relative;
            margin-bottom: 28px;
            padding-left: 50px;
            animation: fadeInUp 0.4s ease both;
        }

        .update-entry:nth-child(1) { animation-delay: 0.05s; }
        .update-entry:nth-child(2) { animation-delay: 0.1s; }
        .update-entry:nth-child(3) { animation-delay: 0.15s; }
        .update-entry:nth-child(4) { animation-delay: 0.2s; }
        .update-entry:nth-child(5) { animation-delay: 0.25s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Dot di timeline */
        .update-dot {
            position: absolute;
            left: 10px;
            top: 16px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #0a0a0c;
            border: 2px solid var(--accent, #00eaff);
            box-shadow: 0 0 10px rgba(0, 234, 255, 0.5);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .update-dot i {
            font-size: 7px;
            color: var(--accent, #00eaff);
        }

        /* Kartu update */
        .update-card {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 16px 18px;
            transition: border-color 0.25s;
        }

        .update-card:hover {
            border-color: rgba(0, 234, 255, 0.2);
        }

        /* Header kartu */
        .update-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .update-card-title {
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            margin: 0;
            line-height: 1.3;
            flex: 1;
        }

        .update-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .update-version {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent, #00eaff);
            background: rgba(0, 234, 255, 0.1);
            border: 1px solid rgba(0, 234, 255, 0.25);
            border-radius: 20px;
            padding: 2px 10px;
        }

        .update-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
        }

        /* Admin actions */
        .update-admin-actions {
            display: none;
            gap: 6px;
            margin-left: auto;
        }

        .is-admin .update-admin-actions {
            display: flex;
        }

        .update-action-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            padding: 4px 6px;
            font-size: 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .update-action-btn:hover {
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
        }

        /* Items list */
        .update-items {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .update-item {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.5;
        }

        .update-item-badge {
            flex-shrink: 0;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.8px;
            padding: 2px 7px;
            border-radius: 20px;
            margin-top: 2px;
            text-transform: uppercase;
        }

        .badge-new {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .badge-fix {
            background: rgba(255, 71, 87, 0.12);
            color: #ff6b7a;
            border: 1px solid rgba(255, 71, 87, 0.25);
        }

        .badge-improve {
            background: rgba(255, 159, 67, 0.12);
            color: #ff9f43;
            border: 1px solid rgba(255, 159, 67, 0.25);
        }

        .badge-remove {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ── EMPTY STATE ── */
        .updates-empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.25);
        }

        .updates-empty i {
            font-size: 36px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.4;
        }

        /* ── SKELETON ── */
        .update-skeleton {
            padding-left: 50px;
            margin-bottom: 28px;
        }

        .update-skeleton .sk-dot {
            position: absolute;
            left: 10px;
            top: 16px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        /* ── MODAL ── */
        #updatesModal .glass-modal-box {
            max-width: 500px;
            width: 94vw;
            max-height: 90vh;
            overflow-y: auto;
        }

        .item-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-row select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            width: 100px;
        }

        .item-row select option { background: #111; }

        .item-row input {
            flex: 1;
        }

        .item-row .remove-item-btn {
            background: transparent;
            border: none;
            color: rgba(255,71,87,0.5);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            flex-shrink: 0;
            transition: color 0.2s;
        }

        .item-row .remove-item-btn:hover { color: #ff4757; }

        .add-item-btn {
            width: 100%;
            padding: 10px;
            background: rgba(0,234,255,0.05);
            border: 1px dashed rgba(0,234,255,0.25);
            border-radius: 10px;
            color: rgba(0,234,255,0.6);
            cursor: pointer;
            font-size: 13px;
            margin-top: 4px;
            transition: all 0.2s;
        }

        .add-item-btn:hover {
            background: rgba(0,234,255,0.1);
            color: #00eaff;
        }

        /* ── FAB ── */
        .updates-fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 999;
            display: none;
        }

        .updates-fab button {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00eaff, #007bff);
            border: none;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(0, 234, 255, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .updates-fab button:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(0, 234, 255, 0.5);
        }

        /* ── PAGE HEADER ── */
        .updates-page-header {
            margin-bottom: 28px;
        }

        .updates-page-header h1 {
            margin: 0 0 6px 0;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .updates-page-header p {
            margin: 0;
            font-size: 12px;
            color: rgba(255,255,255,0.35);
        }
    </style>
</head>

<body>

    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">
        <div class="left-section">
            <div class="glow">
                <h1><i class="fa-solid fa-rocket" style="font-size:22px;"></i> Updates</h1>
            </div>
            <p style="color:rgba(255,255,255,0.35); font-size:12px; margin-top:4px;">
                Catatan perubahan & fitur baru yang udah ditambahin
            </p>
        </div>

        <div class="right-section">
            <div id="updatesContainer">
                <!-- skeleton -->
                <div style="position:relative; padding-left:50px; margin-bottom:28px;">
                    <div class="skeleton" style="position:absolute;left:10px;top:16px;width:18px;height:18px;border-radius:50%;"></div>
                    <div class="course-card" style="padding:16px 18px;">
                        <div class="skeleton sk-title" style="width:55%; margin-bottom:12px;"></div>
                        <div class="skeleton sk-text"></div>
                        <div class="skeleton sk-text short"></div>
                    </div>
                </div>
                <div style="position:relative; padding-left:50px; margin-bottom:28px;">
                    <div class="skeleton" style="position:absolute;left:10px;top:16px;width:18px;height:18px;border-radius:50%;"></div>
                    <div class="course-card" style="padding:16px 18px;">
                        <div class="skeleton sk-title" style="width:40%; margin-bottom:12px;"></div>
                        <div class="skeleton sk-text"></div>
                        <div class="skeleton sk-text"></div>
                        <div class="skeleton sk-text short"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FAB (admin only) -->
    <div class="updates-fab" id="updatesFab">
        <button onclick="openUpdatesModal()" title="Tambah Update">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- Modal tambah update -->
    <div id="updatesModal" class="modal-overlay hidden" style="z-index:3000;">
        <div class="glass-modal-box">
            <h3 style="margin-bottom:18px;"><i class="fa-solid fa-rocket"></i> Update Baru</h3>

            <input type="text" id="um_title" class="glass-input" placeholder="Judul update  (cth: Update 31 Maret)" spellcheck="false">
            <input type="text" id="um_version" class="glass-input" placeholder="Versi  (opsional, cth: v2.3)" spellcheck="false" style="font-size:12px;">

            <label style="font-size:12px; color:#aaa; margin:12px 0 8px; display:block;">
                <i class="fa-solid fa-list-ul" style="margin-right:6px;"></i>Daftar Perubahan
            </label>
            <div id="um_itemsWrap"></div>
            <button class="add-item-btn" onclick="addItemRow()">
                <i class="fa-solid fa-plus"></i> Tambah baris
            </button>

            <div class="action-buttons" style="margin-top:20px;">
                <button class="btn-glass-cancel" onclick="closeUpdatesModal()">Batal</button>
                <button class="btn-glass-save" id="um_btnSave" onclick="saveUpdate()">
                    <i class="fa-solid fa-paper-plane"></i> Post
                </button>
            </div>
        </div>
    </div>

    <script>
        const TYPE_LABELS = { new: 'NEW', fix: 'FIX', improve: 'IMPROVE', remove: 'REMOVE' };
        const TYPE_CLASS  = { new: 'badge-new', fix: 'badge-fix', improve: 'badge-improve', remove: 'badge-remove' };

        let _isAdmin = false;

        // ── INIT ──────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            const user = (() => { try { return JSON.parse(localStorage.getItem('user')); } catch(e) { return null; } })();
            if (!user) return;

            _isAdmin = user.role === 'class_admin' || user.role === 'super_admin';
            if (_isAdmin) document.getElementById('updatesFab').style.display = 'block';
            if (_isAdmin) document.body.classList.add('is-admin');

            await loadUpdates();
        });

        // ── LOAD ──────────────────────────────────────────────────────
        async function loadUpdates() {
            const container = document.getElementById('updatesContainer');
            try {
                const { data, error } = await supabase
                    .from('app_updates')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="updates-empty">
                            <i class="fa-solid fa-rocket"></i>
                            <p>Belum ada update yang dicatat.</p>
                        </div>`;
                    return;
                }

                renderUpdates(data);
            } catch (err) {
                console.error('Load updates gagal:', err);
                container.innerHTML = `<p style="color:#ff4757; padding:20px; text-align:center;">Gagal memuat data.</p>`;
            }
        }

        // ── RENDER ────────────────────────────────────────────────────
        function renderUpdates(data) {
            const container = document.getElementById('updatesContainer');
            const timeline = document.createElement('div');
            timeline.className = 'updates-timeline';

            data.forEach(entry => {
                const items = Array.isArray(entry.items) ? entry.items : [];
                const date = new Date(entry.created_at).toLocaleDateString('id-ID', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });

                const itemsHTML = items.map(it => `
                    <li class="update-item">
                        <span class="update-item-badge ${TYPE_CLASS[it.type] || 'badge-new'}">
                            ${TYPE_LABELS[it.type] || 'NEW'}
                        </span>
                        <span>${it.text}</span>
                    </li>`).join('');

                const el = document.createElement('div');
                el.className = 'update-entry';
                el.dataset.id = entry.id;
                el.innerHTML = `
                    <div class="update-dot"><i class="fa-solid fa-circle"></i></div>
                    <div class="update-card">
                        <div class="update-card-header">
                            <p class="update-card-title">${entry.title}</p>
                            <div class="update-meta">
                                ${entry.version ? `<span class="update-version">${entry.version}</span>` : ''}
                                <span class="update-date">${date}</span>
                            </div>
                            <div class="update-admin-actions">
                                <button class="update-action-btn" onclick="deleteUpdate(event, '${entry.id}')" title="Hapus">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        ${items.length > 0 ? `<ul class="update-items">${itemsHTML}</ul>` : ''}
                    </div>`;
                timeline.appendChild(el);
            });

            container.replaceChildren(timeline);
        }

        // ── MODAL ─────────────────────────────────────────────────────
        function openUpdatesModal() {
            document.getElementById('updatesModal').classList.remove('hidden');
            if (typeof lockScroll === 'function') lockScroll();
            // Selalu mulai dengan 1 baris kosong
            document.getElementById('um_itemsWrap').innerHTML = '';
            addItemRow();
            document.getElementById('um_title').focus();
        }

        function closeUpdatesModal() {
            document.getElementById('updatesModal').classList.add('hidden');
            if (typeof unlockScroll === 'function') unlockScroll();
            document.getElementById('um_title').value = '';
            document.getElementById('um_version').value = '';
            document.getElementById('um_itemsWrap').innerHTML = '';
        }

        function addItemRow(type = 'new', text = '') {
            const wrap = document.getElementById('um_itemsWrap');
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <select>
                    <option value="new"  ${type==='new'?'selected':''}>✨ NEW</option>
                    <option value="fix"  ${type==='fix'?'selected':''}>🐛 FIX</option>
                    <option value="improve" ${type==='improve'?'selected':''}>⚡ IMPROVE</option>
                    <option value="remove" ${type==='remove'?'selected':''}>🗑️ REMOVE</option>
                </select>
                <input type="text" class="glass-input" placeholder="Deskripsi perubahan..." value="${text}" spellcheck="false" style="margin:0;">
                <button class="remove-item-btn" onclick="this.parentElement.remove()">
                    <i class="fa-solid fa-xmark"></i>
                </button>`;
            wrap.appendChild(row);
            row.querySelector('input').focus();
        }

        // ── SAVE ──────────────────────────────────────────────────────
        async function saveUpdate() {
            const title = document.getElementById('um_title').value.trim();
            if (!title) { if (typeof showPopup==='function') showPopup('Judul wajib diisi!', 'error'); return; }

            const rows = document.querySelectorAll('#um_itemsWrap .item-row');
            const items = [];
            rows.forEach(row => {
                const type = row.querySelector('select').value;
                const text = row.querySelector('input').value.trim();
                if (text) items.push({ type, text });
            });

            const btn = document.getElementById('um_btnSave');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Posting...';

            try {
                const { error } = await supabase.from('app_updates').insert({
                    title,
                    version: document.getElementById('um_version').value.trim() || null,
                    items
                });

                if (error) throw error;

                closeUpdatesModal();
                await loadUpdates();
                if (typeof showToast === 'function') showToast('Update berhasil dipost!', 'success');
            } catch (err) {
                console.error(err);
                if (typeof showPopup === 'function') showPopup('Gagal: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Post';
            }
        }

        // ── DELETE ────────────────────────────────────────────────────
        async function deleteUpdate(e, id) {
            e.stopPropagation();
            const yakin = await showPopup('Hapus update ini?', 'confirm');
            if (!yakin) return;

            try {
                const { error } = await supabase.from('app_updates').delete().eq('id', id);
                if (error) throw error;

                document.querySelector(`.update-entry[data-id="${id}"]`)?.remove();
                if (typeof showToast === 'function') showToast('Update dihapus', 'success');

                // Kalau timeline kosong, tampilkan empty state
                const timeline = document.querySelector('.updates-timeline');
                if (timeline && timeline.children.length === 0) {
                    document.getElementById('updatesContainer').innerHTML = `
                        <div class="updates-empty">
                            <i class="fa-solid fa-rocket"></i>
                            <p>Belum ada update yang dicatat.</p>
                        </div>`;
                }
            } catch (err) {
                if (typeof showPopup === 'function') showPopup('Gagal hapus: ' + err.message, 'error');
            }
        }

        // Tutup modal klik luar
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('updatesModal').addEventListener('click', function(e) {
                if (e.target === this) closeUpdatesModal();
            });
        });

        // Keyboard shortcut
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && !document.getElementById('updatesModal').classList.contains('hidden')) {
                closeUpdatesModal();
            }
            if (e.ctrlKey && e.key === 'Enter' && !document.getElementById('updatesModal').classList.contains('hidden')) {
                e.preventDefault();
                saveUpdate();
            }
        });
    </script>
</body>

</html>
