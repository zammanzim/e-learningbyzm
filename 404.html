<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error • E-Learning Nizam</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-clients.js" defer></script>
  <script src="../js/ctx-menu.js"></script>
  <script src="../js/ui-components.js" defer></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/lang.js"></script>
  <script src="../js/basicfeat.js"></script>
  <script src="../js/show-popup.js"></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/activity.js" defer></script>
  <script src="../js/visitor.js" defer></script>
  <script src="../js/subject-manager.js" defer></script>
  <script src="../js/theme.js"></script>
  <script src="../js/toast.js"></script>
  <link rel="stylesheet" href="../css/styleasli.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body style="overflow: hidden; display: flex; justify-content: center; align-items: center;">

  <div class="sidebar" id="sidebar"></div>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>


  <div class="course-card animate-pop-up" style="text-align:center">

    <i class="fa-solid fa-circle-exclamation uni-icon error" style="font-size:72px; margin-bottom:15px;"></i>

    <h2 style="margin-bottom:8px;">404 — Halaman Tidak Ditemukan</h2>

    <p style="opacity:.85; line-height:1.6;">
      Mungkin halaman belum selesai dibuat,<br>
      atau bisa jadi link salah.
    </p>

    <div style="margin-top:25px; display:flex; justify-content:center; gap:12px;">
      <a href="../../../../../" class="uni-btn" style="text-decoration: none;">
                        <i class="fa-solid fa-house"></i> <span data-i18n="home">Beranda</span>
      </a>

    </div>

  </div>

  <script>
    // Log 404 ke database biar tau broken link
    document.addEventListener('DOMContentLoaded', () => {
      const payload = {
        url: window.location.href,
        referrer: document.referrer || '',
        user_agent: navigator.userAgent,
        user_id: (() => {
          try {
            const u = JSON.parse(localStorage.getItem('user') || '{}');
            return u.id || u.email || '';
          } catch { return ''; }
        })()
      };
      supabase.from('page_errors').insert(payload).then(({ error }) => {
        if (error) console.warn('Gagal log 404:', error);
      });
    });
  </script>
</body>
  
</html>
