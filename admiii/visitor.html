<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="visitor">Realtime Visitor Monitor • E-Learning Nizam</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js?v=20260615" defer></script>
    <script src="../js/ctx-menu.js?v=20260615"></script>
    <script src="../js/ui-components.js?v=20260615" defer></script>
    <script src="../js/sidebar.js?v=20260615"></script>
    <script src="../js/lang.js?v=20260615"></script>
    <script src="../js/basicfeat.js?v=20260615" defer></script>
    <script src="../js/show-popup.js?v=20260615" defer></script>
    <script src="../js/activity.js?v=20260615" defer></script>
    <script src="../js/visitor.js?v=20260615" defer></script>
    <script src="../js/auth.js?v=20260615" defer></script>
    <script src="../js/theme.js?v=20260615"></script>
    <script src="../js/toast.js?v=20260615"></script>
    <script src="jsadmiii/visitor-monitor.js?v=20260615" defer></script>
    <link rel="stylesheet" href="../css/styleasli.css?v=20260615">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css?v=20260615">
    <style>
        .class-filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
        }
        .class-btn {
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .class-btn.active {
            background: rgba(0, 234, 255, 0.1);
            color: #00eaff;
            border-color: rgba(0, 234, 255, 0.3);
        }

        .monitor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .monitor-full {
            grid-column: 1 / -1;
        }
        @media (max-width: 1024px) {
            .monitor-grid { grid-template-columns: 1fr; }
        }

        .monitor-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 234, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }
        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 8px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filter-group label { font-size: 10px; color: #666; font-weight: 700; text-transform: uppercase; }
        .filter-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
        }
        .filter-input:focus { border-color: #00eaff; }

        .online-count {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: flex; align-items: center; gap: 6px;
        }
        .online-count::before {
            content: ""; width: 8px; height: 8px; background: #2ed573; border-radius: 50%;
            display: inline-block; box-shadow: 0 0 8px #2ed573; animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .user-list, .activity-list, .visitor-list {
            list-style: none; padding: 0; margin: 0;
            display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto; max-height: 500px;
        }
        .item-card {
            display: flex; align-items: center; gap: 12px;
            padding: 10px; background: rgba(255, 255, 255, 0.03);
            border-radius: 10px; transition: all 0.2s; border: 1px solid transparent;
        }
        .item-card:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(0, 234, 255, 0.1); }
        .avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.1); }
        .info { flex: 1; }
        .name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 2px; }
        .meta { font-size: 11px; color: #888; display: flex; align-items: center; gap: 8px; }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: 700; }
        .role-super_admin { background: rgba(0, 234, 255, 0.1); color: #00eaff; }
        .role-student { background: rgba(255, 255, 255, 0.05); color: #bbb; }
        .time { font-size: 10px; color: #555; margin-left: auto; text-align: right; }
        .accent-text { color: #00eaff; font-weight: 600; }
        .class-tag { font-size: 10px; background: rgba(255, 215, 0, 0.1); color: #ffd700; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">
        <h2 style="color: var(--accent, #00eaff); margin-bottom: 25px;"><i class="fa-solid fa-tower-broadcast"></i> <span data-i18n="visitor">Visitor Monitor</span></h2>

        <!-- CLASS SWITCHER (Dynamic) -->
        <div class="class-filter-bar" id="classSwitcher">
            <div style="padding: 10px; color: #555; font-size: 12px;">
                <i class="fa-solid fa-circle-notch fa-spin"></i> <span data-i18n="loading">Loading Classes...</span>
            </div>
        </div>
        
        <div class="monitor-grid">
            <!-- 1. ONLINE NOW -->
            <div class="monitor-box">
                <div class="box-header">
                    <h3><i class="fa-solid fa-users"></i> Online Sekarang</h3>
                    <div class="online-count" id="onlineCount">0 Online</div>
                </div>
                <ul class="user-list" id="onlineUserList">
                    <div style="padding: 40px; text-align: center; color: #555;">
                        <i class="fa-solid fa-circle-notch fa-spin"></i> <span data-i18n="loading">Connecting Presence...</span>
                    </div>
                </ul>
            </div>

            <!-- 2. LAST VISITORS (Daily) -->
            <div class="monitor-box">
                <div class="box-header">
                    <h3><i class="fa-solid fa-eye"></i> Pengunjung Terakhir</h3>
                    <div style="font-size: 12px; color: #888;" id="visitorCount">0 Hari Ini</div>
                </div>
                <ul class="visitor-list" id="lastVisitorList">
                    <div style="padding: 40px; text-align: center; color: #555;">
                        <i class="fa-solid fa-circle-notch fa-spin"></i> <span data-i18n="loading">Loading visitors...</span>
                    </div>
                </ul>
            </div>

            <!-- 3. ADVANCED ACTIVITY LOG -->
            <div class="monitor-box monitor-full">
                <div class="box-header">
                    <h3><i class="fa-solid fa-clock-rotate-left"></i> Log Aktivitas</h3>
                    <div id="activityCount" style="font-size: 12px; color: #888;">0 Ditemukan</div>
                </div>

                <!-- FILTERS -->
                <div class="filter-row">
                    <div class="filter-group">
                        <label data-i18n="search_user">Cari User</label>
                        <input type="text" id="filterUser" class="filter-input" placeholder="Nama..." oninput="debounceFilter()">
                    </div>
                    <div class="filter-group">
                        <label>Tanggal</label>
                        <input type="date" id="filterDate" class="filter-input" onchange="applyFilters()">
                    </div>
                    <div class="filter-group">
                        <label>Limit</label>
                        <select id="filterLimit" class="filter-input" onchange="applyFilters()">
                            <option value="20">20</option>
                            <option value="50" selected>50</option>
                            <option value="100">100</option>
                            <option value="200">200</option>
                        </select>
                    </div>
                    <div class="filter-group" style="margin-left:auto; justify-content: flex-end;">
                         <button class="uni-btn" style="padding:6px 15px; font-size:12px;" onclick="resetFilters()" data-i18n="reset">Reset</button>
                    </div>
                </div>

                <ul class="activity-list" id="activityList">
                    <div style="padding: 40px; text-align: center; color: #555;">
                        <i class="fa-solid fa-circle-notch fa-spin"></i> <span data-i18n="loading">Menarik data log...</span>
                    </div>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
