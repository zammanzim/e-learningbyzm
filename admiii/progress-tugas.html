<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Progress Tugas Siswa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js" defer></script>
    <script src="../js/ui-components.js" defer></script>
    <script src="../js/basicfeat.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/visitor.js" defer></script>
    <script src="../js/theme.js"></script>
<script src="../js/toast.js"></script>
    <link rel="stylesheet" href="../css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ── STAT CARDS ── */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }

        .stat-val {
            font-size: 24px;
            font-weight: 800;
            color: #00eaff;
        }

        .stat-lbl {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }

        /* ── CONTROLS ── */
        .ctrl-input,
        .ctrl-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: #fff;
            padding: 9px 12px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        .ctrl-input:focus,
        .ctrl-select:focus {
            border-color: #00eaff;
        }

        .ctrl-input::placeholder {
            color: #555;
        }

        .ctrl-select option {
            background: #111;
        }

        /* ── STUDENT CARDS ── */
        .student-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        .student-card:hover {
            border-color: rgba(0, 234, 255, 0.2);
        }

        .student-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }

        .student-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 234, 255, 0.4);
            object-fit: cover;
            flex-shrink: 0;
        }

        .student-info {
            flex: 1;
            min-width: 0;
        }

        .student-name {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }

        .student-sub {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .mini-bar-wrap {
            width: 90px;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .mini-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .student-pct {
            font-size: 13px;
            font-weight: 800;
            width: 38px;
            text-align: right;
            flex-shrink: 0;
        }

        .chevron {
            font-size: 12px;
            color: #555;
            transition: transform 0.25s;
            flex-shrink: 0;
        }

        .student-card.open .chevron {
            transform: rotate(180deg);
        }

        /* ── TASK PANEL ── */
        .task-panel {
            display: none;
            margin-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            padding-top: 14px;
        }

        .student-card.open .task-panel {
            display: block;
        }

        .bulk-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .bulk-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .bulk-btn:hover {
            opacity: 0.8;
        }

        .bulk-btn.all-done {
            background: #0be881;
            color: #000;
        }

        .bulk-btn.all-undone {
            background: rgba(255, 255, 255, 0.08);
            color: #aaa;
        }

        /* Task rows */
        .task-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .task-row:last-child {
            border-bottom: none;
        }

        .task-toggle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1.5px solid #444;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            color: transparent;
            font-size: 11px;
        }

        .task-toggle.done {
            background: #0be881;
            border-color: #0be881;
            color: #000;
        }

        .task-toggle.spinning {
            border-color: #00eaff;
            border-top-color: transparent;
            animation: tspin 0.6s linear infinite;
        }

        @keyframes tspin {
            to {
                transform: rotate(360deg);
            }
        }

        .task-label {
            flex: 1;
            min-width: 0;
        }

        .task-label-title {
            font-size: 13px;
            color: #ddd;
            font-weight: 600;
        }

        .task-label-sub {
            font-size: 11px;
            color: #555;
            margin-top: 1px;
        }

        .task-mapel {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(0, 234, 255, 0.08);
            color: #00eaff;
            border: 1px solid rgba(0, 234, 255, 0.18);
            flex-shrink: 0;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── EMPTY / LOADING ── */
        .list-empty {
            text-align: center;
            padding: 50px 20px;
            color: #555;
        }

        .list-empty i {
            font-size: 30px;
            margin-bottom: 10px;
            display: block;
        }

        .list-empty p {
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">

        <!-- LEFT: Stats + Controls (sticky) -->
        <div class="left-section">
            <div class="glow">
                <h1><i class="fa-solid fa-clipboard-check" style="font-size:22px;"></i> Progress Tugas Siswa</h1>
            </div>

            <!-- Stat cards 2x2 -->
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-val" id="statSiswa">—</div>
                    <div class="stat-lbl">Siswa</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="statTugas">—</div>
                    <div class="stat-lbl">Total Tugas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="statRataRata">—</div>
                    <div class="stat-lbl">Rata-rata Selesai</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="statLulus">—</div>
                    <div class="stat-lbl">100% Selesai</div>
                </div>
            </div>

            <!-- Search + Sort -->
            <input class="ctrl-input" id="searchInput" placeholder="🔍 Cari nama siswa..." oninput="renderStudents()">
            <select class="ctrl-select" id="sortSelect" onchange="renderStudents()">
                <option value="name">Urutkan: Nama</option>
                <option value="pct_desc">Progress ↓</option>
                <option value="pct_asc">Progress ↑</option>
            </select>

            <!-- Bulk all -->
            <button class="btn-glass-save" style="width:100%; margin-top:4px;" onclick="bulkAllDoneConfirm()">
                <i class="fa-solid fa-check-double"></i> Selesaikan Semua Siswa
            </button>
        </div>

        <!-- RIGHT: Student list -->
        <div class="right-section">
            <div id="studentList">
                <!-- Skeleton loading -->
                <div class="student-card">
                    <div class="student-header" style="pointer-events:none;">
                        <div class="skeleton" style="width:40px;height:40px;border-radius:50%;"></div>
                        <div class="student-info">
                            <div class="skeleton" style="width:100px;height:12px;border-radius:4px;margin-bottom:6px;">
                            </div>
                            <div class="skeleton" style="width:70px;height:9px;border-radius:4px;"></div>
                        </div>
                        <div class="skeleton" style="width:90px;height:6px;border-radius:3px;"></div>
                        <div class="skeleton" style="width:34px;height:12px;border-radius:4px;"></div>
                    </div>
                </div>
                <div class="student-card">
                    <div class="student-header" style="pointer-events:none;">
                        <div class="skeleton" style="width:40px;height:40px;border-radius:50%;"></div>
                        <div class="student-info">
                            <div class="skeleton" style="width:80px;height:12px;border-radius:4px;margin-bottom:6px;">
                            </div>
                            <div class="skeleton" style="width:60px;height:9px;border-radius:4px;"></div>
                        </div>
                        <div class="skeleton" style="width:90px;height:6px;border-radius:3px;"></div>
                        <div class="skeleton" style="width:34px;height:12px;border-radius:4px;"></div>
                    </div>
                </div>
                <div class="student-card">
                    <div class="student-header" style="pointer-events:none;">
                        <div class="skeleton" style="width:40px;height:40px;border-radius:50%;"></div>
                        <div class="student-info">
                            <div class="skeleton" style="width:110px;height:12px;border-radius:4px;margin-bottom:6px;">
                            </div>
                            <div class="skeleton" style="width:75px;height:9px;border-radius:4px;"></div>
                        </div>
                        <div class="skeleton" style="width:90px;height:6px;border-radius:3px;"></div>
                        <div class="skeleton" style="width:34px;height:12px;border-radius:4px;"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let allStudents = [];
        let allTasks = [];
        let progressMap = {}; // { userId: Set<announcementId(string)> }
        let currentUser = null;

        // ─────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = getUser();
            if (!currentUser) { window.location.href = '../login'; return; }
            if (currentUser.role !== 'super_admin' && currentUser.role !== 'class_admin') {
                window.location.href = '../index';
                return;
            }
            await loadAll();
        });

        // ─────────────────────────────────────────
        async function loadAll() {
            const classId = getEffectiveClassId();

            const [
                { data: students },
                { data: tasks },
                { data: progress }
            ] = await Promise.all([
                supabase.from('users')
                    .select('id, nickname, avatar_url, role')
                    .eq('class_id', classId)
                    .neq('role', 'super_admin')
                    .order('nickname', { ascending: true }),

                supabase.from('subject_announcements')
                    .select('id, big_title, title, subject_id')
                    .eq('class_id', classId)
                    .neq('subject_id', 'announcements')
                    .neq('subject_id', 'kisi-kisi')
                    .neq('subject_id', 'akuhutajakus')
                    .order('created_at', { ascending: false }),

                supabase.from('user_progress')
                    .select('user_id, announcement_id')
            ]);

            allStudents = students || [];
            allTasks = tasks || [];

            progressMap = {};
            allStudents.forEach(s => { progressMap[s.id] = new Set(); });
            (progress || []).forEach(p => {
                const uid = String(p.user_id);
                if (progressMap[uid]) progressMap[uid].add(String(p.announcement_id));
            });

            updateStats();
            renderStudents();
        }

        // ─────────────────────────────────────────
        function updateStats() {
            const total = allTasks.length;
            const validIds = new Set(allTasks.map(t => String(t.id)));
            let totalDone = 0, lulus = 0;

            allStudents.forEach(s => {
                const done = [...(progressMap[s.id] || [])].filter(id => validIds.has(id)).length;
                totalDone += done;
                if (total > 0 && done === total) lulus++;
            });

            const rata = allStudents.length > 0 && total > 0
                ? Math.round((totalDone / (allStudents.length * total)) * 100)
                : 0;

            document.getElementById('statSiswa').innerText = allStudents.length;
            document.getElementById('statTugas').innerText = total;
            document.getElementById('statRataRata').innerText = rata + '%';
            document.getElementById('statLulus').innerText = lulus;
        }

        // ─────────────────────────────────────────
        function renderStudents() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const sort = document.getElementById('sortSelect').value;
            const total = allTasks.length;
            const validIds = new Set(allTasks.map(t => String(t.id)));

            let list = allStudents
                .filter(s => (s.nickname || '').toLowerCase().includes(search))
                .map(s => {
                    const done = [...(progressMap[s.id] || [])].filter(id => validIds.has(id)).length;
                    return { ...s, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
                });

            if (sort === 'pct_desc') list.sort((a, b) => b.pct - a.pct);
            else if (sort === 'pct_asc') list.sort((a, b) => a.pct - b.pct);
            else list.sort((a, b) => (a.nickname || '').localeCompare(b.nickname || ''));

            const container = document.getElementById('studentList');

            if (list.length === 0) {
                container.innerHTML = `<div class="list-empty"><i class="fa-solid fa-users-slash"></i><p>Tidak ada siswa ditemukan.</p></div>`;
                return;
            }

            container.innerHTML = '';
            list.forEach(s => container.appendChild(buildStudentCard(s)));
        }

        // ─────────────────────────────────────────
        function buildStudentCard(student) {
            const { id, nickname, avatar_url, done, pct } = student;
            const total = allTasks.length;
            const color = pct === 100 ? '#0be881' : pct >= 60 ? '#ff8c00' : '#ff4757';

            const card = document.createElement('div');
            card.className = 'student-card';
            card.id = `sc-${id}`;

            card.innerHTML = `
            <div class="student-header" onclick="toggleCard('${id}')">
                <img class="student-avatar" src="${avatar_url || '../icons/profpicture.png'}"
                    onerror="this.src='../icons/profpicture.png'">
                <div class="student-info">
                    <div class="student-name">${escHtml(nickname || 'Tanpa Nama')}</div>
                    <div class="student-sub" id="sc-sub-${id}">${done}/${total} tugas selesai</div>
                </div>
                <div class="mini-bar-wrap">
                    <div class="mini-bar" id="sc-bar-${id}" style="width:${pct}%; background:${color};"></div>
                </div>
                <div class="student-pct" id="sc-pct-${id}" style="color:${color};">${pct}%</div>
                <i class="fa-solid fa-chevron-down chevron"></i>
            </div>

            <div class="task-panel" id="tp-${id}">
                <div class="bulk-btns">
                    <button class="bulk-btn all-done" onclick="bulkStudent('${id}', true)">
                        <i class="fa-solid fa-check-double"></i> Selesaikan Semua
                    </button>
                    <button class="bulk-btn all-undone" onclick="bulkStudent('${id}', false)">
                        <i class="fa-solid fa-rotate-left"></i> Reset Semua
                    </button>
                </div>
                <div id="task-rows-${id}">${buildTaskRows(id)}</div>
            </div>
        `;
            return card;
        }

        function buildTaskRows(studentId) {
            if (allTasks.length === 0) return `<p style="color:#555;font-size:13px;padding:10px 0;">Belum ada tugas.</p>`;
            const doneSet = progressMap[studentId] || new Set();

            return allTasks.map(task => {
                const isDone = doneSet.has(String(task.id));
                return `
                <div class="task-row">
                    <button class="task-toggle ${isDone ? 'done' : ''}"
                        id="toggle-${studentId}-${task.id}"
                        onclick="toggleTask('${studentId}', '${task.id}', this)">
                        ${isDone ? '<i class="fa-solid fa-check"></i>' : ''}
                    </button>
                    <div class="task-label">
                        <div class="task-label-title">${escHtml(task.big_title)}</div>
                        ${task.title ? `<div class="task-label-sub">${escHtml(task.title)}</div>` : ''}
                    </div>
                    <span class="task-mapel">${escHtml(task.subject_id)}</span>
                </div>`;
            }).join('');
        }

        function toggleCard(studentId) {
            document.getElementById(`sc-${studentId}`)?.classList.toggle('open');
        }

        // ─────────────────────────────────────────
        async function toggleTask(studentId, taskId, btn) {
            const wasDone = btn.classList.contains('done');
            btn.className = 'task-toggle spinning';
            btn.innerHTML = '';

            try {
                if (wasDone) {
                    await supabase.from('user_progress').delete()
                        .eq('user_id', studentId).eq('announcement_id', taskId);
                    progressMap[studentId]?.delete(String(taskId));
                } else {
                    await supabase.from('user_progress').insert({ user_id: studentId, announcement_id: taskId });
                    if (!progressMap[studentId]) progressMap[studentId] = new Set();
                    progressMap[studentId].add(String(taskId));
                }
                btn.className = `task-toggle ${!wasDone ? 'done' : ''}`;
                btn.innerHTML = !wasDone ? '<i class="fa-solid fa-check"></i>' : '';
                refreshStudentBar(studentId);
                updateStats();
            } catch (err) {
                btn.className = `task-toggle ${wasDone ? 'done' : ''}`;
                btn.innerHTML = wasDone ? '<i class="fa-solid fa-check"></i>' : '';
                showPopup('Gagal update', 'error');
            }
        }

        // ─────────────────────────────────────────
        async function bulkStudent(studentId, markDone) {
            const panel = document.getElementById(`tp-${studentId}`);
            panel.querySelectorAll('.bulk-btn').forEach(b => b.disabled = true);

            try {
                if (markDone) {
                    const doneSet = progressMap[studentId] || new Set();
                    const pending = allTasks.filter(t => !doneSet.has(String(t.id)));
                    if (pending.length > 0) {
                        const { error } = await supabase.from('user_progress')
                            .insert(pending.map(t => ({ user_id: studentId, announcement_id: t.id })));
                        if (error) throw error;
                        if (!progressMap[studentId]) progressMap[studentId] = new Set();
                        pending.forEach(t => progressMap[studentId].add(String(t.id)));
                    }
                } else {
                    const { error } = await supabase.from('user_progress').delete()
                        .eq('user_id', studentId)
                        .in('announcement_id', allTasks.map(t => t.id));
                    if (error) throw error;
                    progressMap[studentId] = new Set();
                }

                document.getElementById(`task-rows-${studentId}`).innerHTML = buildTaskRows(studentId);
                refreshStudentBar(studentId);
                updateStats();
                showPopup(markDone ? 'Semua ditandai selesai!' : 'Progress direset!', 'success');
            } catch (err) {
                showPopup('Gagal: ' + err.message, 'error');
            } finally {
                panel.querySelectorAll('.bulk-btn').forEach(b => b.disabled = false);
            }
        }

        // ─────────────────────────────────────────
        async function bulkAllDoneConfirm() {
            if (!confirm(`Selesaikan SEMUA tugas untuk SEMUA ${allStudents.length} siswa?`)) return;

            const btn = document.querySelector('.left-section .btn-glass-save');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Proses...';

            try {
                const rows = [];
                allStudents.forEach(s => {
                    const doneSet = progressMap[s.id] || new Set();
                    allTasks.forEach(t => {
                        if (!doneSet.has(String(t.id))) rows.push({ user_id: s.id, announcement_id: t.id });
                    });
                });

                for (let i = 0; i < rows.length; i += 500) {
                    const { error } = await supabase.from('user_progress').insert(rows.slice(i, i + 500));
                    if (error) throw error;
                }

                allStudents.forEach(s => {
                    if (!progressMap[s.id]) progressMap[s.id] = new Set();
                    allTasks.forEach(t => progressMap[s.id].add(String(t.id)));
                });

                showPopup(`${rows.length} progress berhasil ditambahkan!`, 'success');
                updateStats();
                renderStudents();
            } catch (err) {
                showPopup('Gagal: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-check-double"></i> Selesaikan Semua Siswa';
            }
        }

        // ─────────────────────────────────────────
        function refreshStudentBar(studentId) {
            const total = allTasks.length;
            const validIds = new Set(allTasks.map(t => String(t.id)));
            const done = [...(progressMap[studentId] || [])].filter(id => validIds.has(id)).length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            const color = pct === 100 ? '#0be881' : pct >= 60 ? '#ff8c00' : '#ff4757';

            const bar = document.getElementById(`sc-bar-${studentId}`);
            const pctEl = document.getElementById(`sc-pct-${studentId}`);
            const subEl = document.getElementById(`sc-sub-${studentId}`);

            if (bar) { bar.style.width = pct + '%'; bar.style.background = color; }
            if (pctEl) { pctEl.innerText = pct + '%'; pctEl.style.color = color; }
            if (subEl) subEl.innerText = `${done}/${total} tugas selesai`;
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>

</html>
