<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Progress Tugas • E-Learning Nizam</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js" defer></script>
    <script src="../js/ui-components.js" defer></script>
    <script src="../js/basicfeat.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/visitor.js" defer></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <link rel="stylesheet" href="../css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ── BULK BANNER ── */
        .bulk-banner {
            margin-top: 16px;
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .bulk-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 120px;
        }

        .bulk-bar-wrap {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 3px;
            overflow: hidden;
        }

        .bulk-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .bulk-count {
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .bulk-actions {
            display: flex;
            gap: 7px;
            flex-shrink: 0;
        }

        .btn-bulk-done {
            padding: 7px 14px;
            border-radius: 9px;
            border: none;
            background: #0be881;
            color: #000;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-bulk-done:hover {
            opacity: 0.85;
        }

        .btn-bulk-done:active {
            transform: scale(0.97);
        }

        .btn-bulk-done:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-bulk-reset {
            padding: 7px 12px;
            border-radius: 9px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-bulk-reset:hover {
            opacity: 0.8;
        }

        .btn-bulk-reset:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ── STAT ── */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-val {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent, #00eaff);
            display: block;
        }

        .stat-lbl {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        /* ── CONTROLS ── */
        .ctrl-input,
        .ctrl-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 9px 12px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        .ctrl-input:focus,
        .ctrl-select:focus {
            border-color: var(--accent, #00eaff);
        }

        .ctrl-input::placeholder {
            color: #444;
        }

        .ctrl-select option {
            background: #111;
        }

        .mapel-filter {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .mapel-chip {
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #777;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mapel-chip.active {
            background: rgba(0, 234, 255, 0.1);
            border-color: rgba(0, 234, 255, 0.3);
            color: var(--accent, #00eaff);
        }

        /* ── GLOBAL BAR ── */
        .global-bar-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 14px;
        }

        .global-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
        }

        .gbar-wrap {
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .gbar {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--accent, #00eaff), #0be881);
            transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ── BULK ALL ── */
        .btn-bulk-all {
            width: 100%;
            padding: 10px;
            background: rgba(11, 232, 129, 0.08);
            border: 1px solid rgba(11, 232, 129, 0.2);
            border-radius: 10px;
            color: #0be881;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }

        .btn-bulk-all:hover {
            background: rgba(11, 232, 129, 0.14);
        }

        .btn-bulk-all:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── EMPTY / SKELETON ── */
        .list-empty {
            text-align: center;
            padding: 60px 20px;
            color: #444;
        }

        .list-empty i {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
        }

        .sk {
            background: linear-gradient(90deg, rgba(255, 255, 255, .05) 25%, rgba(255, 255, 255, .10) 50%, rgba(255, 255, 255, .05) 75%);
            background-size: 200% 100%;
            animation: skShimmer 1.4s infinite;
            border-radius: 6px;
        }

        @keyframes skShimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .sk-line {
            height: 12px;
        }

        /* ── MAPEL BADGE ── */
        .mapel-badge {
            display: inline-block;
            margin-bottom: 10px;
            font-size: 10px;
            padding: 2px 9px;
            border-radius: 20px;
            background: rgba(0, 234, 255, 0.08);
            border: 1px solid rgba(0, 234, 255, 0.18);
            color: var(--accent, #00eaff);
            letter-spacing: 0.3px;
        }

        /* ── VIEW TABS ── */
        .view-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 12px;
            gap: 4px;
        }

        .view-tab {
            flex: 1;
            padding: 8px 4px;
            border: none;
            border-radius: 7px;
            background: none;
            color: #555;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .view-tab.active {
            background: rgba(0, 234, 255, 0.1);
            color: var(--accent, #00eaff);
            border: 1px solid rgba(0, 234, 255, 0.2);
        }

        /* ── STUDENT CARD (mode per-orang) ── */
        .student-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .student-card.open {
            border-color: rgba(0, 234, 255, 0.15);
        }

        .student-header {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 13px 14px;
            cursor: pointer;
            user-select: none;
        }

        .student-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 234, 255, 0.3);
            object-fit: cover;
            flex-shrink: 0;
        }

        .student-info {
            flex: 1;
            min-width: 0;
        }

        .student-name {
            font-size: 13px;
            font-weight: 700;
            color: #eee;
        }

        .student-sub {
            font-size: 11px;
            color: #555;
            margin-top: 2px;
        }

        .s-progress-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .s-mini-bar-wrap {
            width: 70px;
            height: 5px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 3px;
            overflow: hidden;
        }

        .s-mini-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .s-pct {
            font-size: 12px;
            font-weight: 800;
            width: 34px;
            text-align: right;
        }

        .s-chevron {
            font-size: 11px;
            color: #444;
            transition: transform 0.25s;
            flex-shrink: 0;
        }

        .student-card.open .s-chevron {
            transform: rotate(180deg);
        }

        /* task panel di dalam student */
        .s-task-panel {
            display: none;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 14px 14px;
        }

        .student-card.open .s-task-panel {
            display: block;
        }

        .s-bulk-btns {
            display: flex;
            gap: 7px;
            margin-bottom: 10px;
        }

        .s-task-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .s-task-row:last-child {
            border-bottom: none;
        }

        .task-toggle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1.5px solid #333;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            color: transparent;
            font-size: 10px;
        }

        .task-toggle.done {
            background: #0be881;
            border-color: #0be881;
            color: #000;
        }

        .task-toggle.spinning {
            border-color: var(--accent, #00eaff);
            border-top-color: transparent;
            animation: tspin 0.6s linear infinite;
            pointer-events: none;
        }

        @keyframes tspin {
            to {
                transform: rotate(360deg);
            }
        }

        .t-label {
            flex: 1;
            min-width: 0;
        }

        .t-label-title {
            font-size: 13px;
            color: #ccc;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .t-label-sub {
            font-size: 11px;
            color: #555;
            margin-top: 1px;
        }

        .t-mapel {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 10px;
            background: rgba(0, 234, 255, 0.07);
            color: #5ec8d8;
            border: 1px solid rgba(0, 234, 255, 0.12);
            flex-shrink: 0;
            max-width: 75px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">

        <!-- LEFT -->
        <div class="left-section">
            <div class="glow">
                <h1><i class="fa-solid fa-clipboard-check" style="font-size:20px;"></i> Progress Tugas</h1>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <span class="stat-val" id="statSiswa">—</span>
                    <div class="stat-lbl">Siswa</div>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="statTugas">—</span>
                    <div class="stat-lbl">Total Tugas</div>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="statRata">—</span>
                    <div class="stat-lbl">Rata-rata</div>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="statLulus">—</span>
                    <div class="stat-lbl">100% Selesai</div>
                </div>
            </div>

            <div class="global-bar-card">
                <div class="global-bar-label">
                    <span>Progress Kelas</span>
                    <span id="gPct">0%</span>
                </div>
                <div class="gbar-wrap">
                    <div class="gbar" id="gBar" style="width:0%"></div>
                </div>
            </div>

            <div class="view-tabs">
                <button class="view-tab active" id="tabTask" onclick="switchView('task')">
                    <i class="fa-solid fa-list-check" style="font-size:11px;margin:0;"></i> Per Tugas
                </button>
                <button class="view-tab" id="tabStudent" onclick="switchView('student')">
                    <i class="fa-solid fa-users" style="font-size:11px;margin:0;"></i> Per Orang
                </button>
            </div>

            <input class="ctrl-input" id="searchInput" placeholder="🔍 Cari..." oninput="debounceRender()">

            <select class="ctrl-select" id="sortSelect" onchange="renderCurrent()">
                <option value="default">Terbaru dulu</option>
                <option value="pct_desc">Paling banyak selesai ↓</option>
                <option value="pct_asc">Paling sedikit selesai ↑</option>
                <option value="name">A–Z Judul</option>
            </select>

            <div class="mapel-filter" id="mapelFilter"></div>

            <button class="btn-bulk-all" id="btnBulkAll" onclick="bulkAllConfirm()">
                <i class="fa-solid fa-check-double"></i> Arsipkan SEMUA Tugas
            </button>
        </div>

        <!-- RIGHT: task cards dengan konten penuh -->
        <div class="right-section">
            <div id="taskList">
                <div class="course-card">
                    <div class="sk sk-line" style="width:30%;margin-bottom:12px;height:10px;border-radius:20px;"></div>
                    <div class="sk sk-line" style="width:55%;margin-bottom:10px;height:20px;"></div>
                    <div class="sk sk-line" style="width:35%;margin-bottom:18px;"></div>
                    <div class="sk sk-line" style="width:90%;margin-bottom:8px;"></div>
                    <div class="sk sk-line" style="width:80%;margin-bottom:8px;"></div>
                    <div class="sk sk-line" style="width:65%;"></div>
                </div>
                <div class="course-card">
                    <div class="sk sk-line" style="width:25%;margin-bottom:12px;height:10px;border-radius:20px;"></div>
                    <div class="sk sk-line" style="width:45%;margin-bottom:10px;height:20px;"></div>
                    <div class="sk sk-line" style="width:30%;margin-bottom:18px;"></div>
                    <div class="sk sk-line" style="width:85%;margin-bottom:8px;"></div>
                    <div class="sk sk-line" style="width:70%;"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let allTasks = [];
        let allStudents = [];
        let progressMap = {};
        let activeMapel = 'all';
        let currentView = 'task';
        let renderTimer = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const me = getUser();
            if (!me) { window.location.href = '../login'; return; }
            if (me.role !== 'super_admin' && me.role !== 'class_admin') {
                window.location.href = '../index'; return;
            }
            await loadAll();
        });

        async function loadAll() {
            const classId = getEffectiveClassId();

            const [
                { data: tasks },
                { data: students },
            ] = await Promise.all([
                supabase.from('subject_announcements')
                    .select('id, big_title, title, content, small, subject_id, card_color, is_done')
                    .eq('class_id', classId)
                    .neq('subject_id', 'announcements')
                    .neq('subject_id', 'kisi-kisi')
                    .neq('subject_id', 'akuhutajakus')
                    .order('created_at', { ascending: false }),

                supabase.from('users')
                    .select('id, full_name, short_name, nickname, avatar_url')
                    .eq('class_id', classId)
                    .neq('role', 'super_admin')
                    .order('full_name', { ascending: true }),
            ]);

            const taskIds = (tasks || []).map(t => t.id);
            const { data: progress } = taskIds.length > 0
                ? await supabase.from('user_progress')
                    .select('user_id, announcement_id')
                    .in('announcement_id', taskIds)
                : { data: [] };

            allTasks = tasks || [];
            allStudents = students || [];

            progressMap = {};
            allStudents.forEach(s => { progressMap[s.id] = new Set(); });
            (progress || []).forEach(p => {
                const uid = String(p.user_id);
                if (progressMap[uid]) progressMap[uid].add(String(p.announcement_id));
            });

            buildMapelFilter();
            updateStats();
            renderCurrent();
        }

        function buildMapelFilter() {
            const mapels = [...new Set(allTasks.map(t => t.subject_id))].sort();
            document.getElementById('mapelFilter').innerHTML =
                `<div class="mapel-chip active" onclick="setMapel('all',this)">Semua</div>` +
                mapels.map(m => `<div class="mapel-chip" onclick="setMapel(${JSON.stringify(m)},this)">${esc(m)}</div>`).join('');
        }

        function setMapel(mapel, chip) {
            activeMapel = mapel;
            document.querySelectorAll('.mapel-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            renderCurrent();
        }

        function updateStats() {
            const n = allStudents.length;
            const total = allTasks.length;
            const validIds = new Set(allTasks.map(t => String(t.id)));
            let totalDone = 0, lulus = 0;

            // Task yang is_done = true dianggap selesai oleh semua siswa (tapi progress row sudah dihapus)
            const archivedCount = allTasks.filter(t => t.is_done).length;
            const activeTaskIds = new Set(allTasks.filter(t => !t.is_done).map(t => String(t.id)));

            allStudents.forEach(s => {
                const activeDone = [...(progressMap[s.id] || [])].filter(id => activeTaskIds.has(id)).length;
                const done = activeDone + archivedCount; // task arsip = otomatis selesai
                totalDone += done;
                if (total > 0 && done === total) lulus++;
            });

            const rata = n > 0 && total > 0 ? Math.round((totalDone / (n * total)) * 100) : 0;
            document.getElementById('statSiswa').innerText = n;
            document.getElementById('statTugas').innerText = total;
            document.getElementById('statRata').innerText = rata + '%';
            document.getElementById('statLulus').innerText = lulus;
            document.getElementById('gPct').innerText = rata + '%';
            document.getElementById('gBar').style.width = rata + '%';
        }

        function debounceRender() {
            clearTimeout(renderTimer);
            renderTimer = setTimeout(renderCurrent, 180);
        }

        function renderCurrent() {
            currentView === 'task' ? renderTasks() : renderStudents();
        }

        function switchView(mode) {
            currentView = mode;
            document.getElementById('tabTask').classList.toggle('active', mode === 'task');
            document.getElementById('tabStudent').classList.toggle('active', mode === 'student');

            const sortEl = document.getElementById('sortSelect');
            if (mode === 'task') {
                sortEl.innerHTML = `
                    <option value="default">Terbaru dulu</option>
                    <option value="pct_desc">Paling banyak selesai ↓</option>
                    <option value="pct_asc">Paling sedikit selesai ↑</option>
                    <option value="name">A–Z Judul</option>`;
                document.getElementById('mapelFilter').style.display = 'flex';
                document.getElementById('btnBulkAll').style.display = 'flex';
                document.getElementById('searchInput').placeholder = '🔍 Cari judul / mapel...';
            } else {
                sortEl.innerHTML = `
                    <option value="name">A–Z Nama</option>
                    <option value="pct_desc">Progress ↓</option>
                    <option value="pct_asc">Progress ↑</option>`;
                document.getElementById('mapelFilter').style.display = 'none';
                document.getElementById('btnBulkAll').style.display = 'flex';
                document.getElementById('searchInput').placeholder = '🔍 Cari nama siswa...';
            }
            renderCurrent();
        }

        // ── MODE 1: Per Tugas ──────────────────────────────
        function renderTasks() {
            const sort = document.getElementById('sortSelect').value;
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const n = allStudents.length;

            let list = allTasks.filter(t =>
                (activeMapel === 'all' || t.subject_id === activeMapel) &&
                (!q || (t.big_title || '').toLowerCase().includes(q) ||
                    (t.subject_id || '').toLowerCase().includes(q) ||
                    (t.title || '').toLowerCase().includes(q))
            ).map(t => {
                // Kalau task sudah diarsipkan (is_done=true), progress row sudah dihapus —
                // anggap done = semua siswa, pct = 100
                const done = t.is_done
                    ? n
                    : allStudents.filter(s => (progressMap[s.id] || new Set()).has(String(t.id))).length;
                const pct = t.is_done ? 100 : (n > 0 ? Math.round((done / n) * 100) : 0);
                return { ...t, done, pct };
            });

            if (sort === 'pct_desc') list.sort((a, b) => b.pct - a.pct);
            else if (sort === 'pct_asc') list.sort((a, b) => a.pct - b.pct);
            else if (sort === 'name') list.sort((a, b) => (a.big_title || '').localeCompare(b.big_title || ''));

            // Pisahkan task aktif vs arsip, arsip selalu di bawah
            const active = list.filter(t => !t.is_done);
            const archived = list.filter(t => t.is_done);
            const sorted = [...active, ...archived];

            const container = document.getElementById('taskList');
            if (sorted.length === 0) {
                container.innerHTML = `<div class="list-empty"><i class="fa-solid fa-inbox"></i><p>Tidak ada tugas ditemukan.</p></div>`;
                return;
            }

            container.innerHTML = '';
            if (archived.length > 0 && active.length > 0) {
                // Divider antara aktif dan arsip
                const divider = document.createElement('div');
                divider.style.cssText = 'text-align:center;color:#444;font-size:11px;letter-spacing:1px;padding:8px 0;margin:4px 0;border-top:1px solid rgba(255,255,255,0.05);';
                divider.innerHTML = `<i class="fa-solid fa-archive" style="margin-right:6px;"></i>DIARSIPKAN (${archived.length})`;
                active.forEach(t => container.appendChild(buildCard(t)));
                container.appendChild(divider);
                archived.forEach(t => container.appendChild(buildCard(t)));
            } else {
                sorted.forEach(t => container.appendChild(buildCard(t)));
            }
        }

        // ── MODE 2: Per Orang ──────────────────────────────
        function renderStudents() {
            const sort = document.getElementById('sortSelect').value;
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const total = allTasks.length;

            // Task yang is_done = true dianggap selesai oleh semua siswa
            const archivedCount = allTasks.filter(t => t.is_done).length;
            const activeTaskIds = new Set(allTasks.filter(t => !t.is_done).map(t => String(t.id)));

            let list = allStudents
                .filter(s => {
                    const name = sName(s).toLowerCase();
                    return !q || name.includes(q) || (s.full_name || '').toLowerCase().includes(q);
                })
                .map(s => {
                    const activeDone = [...(progressMap[s.id] || [])].filter(id => activeTaskIds.has(id)).length;
                    const done = activeDone + archivedCount;
                    return { ...s, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
                });

            if (sort === 'pct_desc') list.sort((a, b) => b.pct - a.pct);
            else if (sort === 'pct_asc') list.sort((a, b) => a.pct - b.pct);
            else list.sort((a, b) => sName(a).localeCompare(sName(b)));

            const container = document.getElementById('taskList');
            if (list.length === 0) {
                container.innerHTML = `<div class="list-empty"><i class="fa-solid fa-users-slash"></i><p>Tidak ada siswa ditemukan.</p></div>`;
                return;
            }

            container.innerHTML = '';
            list.forEach(s => container.appendChild(buildStudentCard(s)));
        }

        function sName(s) {
            return s.short_name || s.nickname || s.full_name?.split(' ')[0] || 'Tanpa Nama';
        }

        function buildStudentCard(student) {
            const { id, avatar_url, done, pct } = student;
            const total = allTasks.length;
            const color = pct === 100 ? '#0be881' : pct >= 60 ? '#ff8c00' : '#ff4757';
            const avatar = avatar_url || '../icons/profpicture.png';

            const card = document.createElement('div');
            card.className = 'student-card';
            card.id = `sc-${id}`;
            card.innerHTML = `
            <div class="student-header" onclick="toggleStudentCard('${id}')">
                <img class="student-avatar" src="${avatar}" onerror="this.src='../icons/profpicture.png'">
                <div class="student-info">
                    <div class="student-name">${esc(sName(student))}</div>
                    <div class="student-sub" id="ssub-${id}">${done}/${total} selesai</div>
                </div>
                <div class="s-progress-wrap">
                    <div class="s-mini-bar-wrap">
                        <div class="s-mini-bar" id="sbar-${id}" style="width:${pct}%;background:${color};"></div>
                    </div>
                    <div class="s-pct" id="spct-${id}" style="color:${color};">${pct}%</div>
                </div>
                <i class="fa-solid fa-chevron-down s-chevron"></i>
            </div>
            <div class="s-task-panel" id="stp-${id}">
                <div class="s-bulk-btns">
                    <button class="btn-bulk-done" onclick="bulkStudent('${id}', true)">
                        <i class="fa-solid fa-check-double" style="margin:0;"></i> Selesaikan Semua
                    </button>
                    <button class="btn-bulk-reset" onclick="bulkStudent('${id}', false)">
                        <i class="fa-solid fa-rotate-left" style="margin:0;"></i> Reset
                    </button>
                </div>
                <div id="strows-${id}">${buildStudentTaskRows(id)}</div>
            </div>`;
            return card;
        }

        function buildStudentTaskRows(studentId) {
            if (allTasks.length === 0) return `<p style="color:#444;font-size:12px;padding:6px 0;">Belum ada tugas.</p>`;
            const doneSet = progressMap[studentId] || new Set();

            // Pisahkan: active tasks dulu, arsip di bawah dengan divider
            const active = allTasks.filter(t => !t.is_done);
            const archived = allTasks.filter(t => t.is_done);

            const buildRow = (task) => {
                if (task.is_done) {
                    // Task diarsipkan — terkunci, selalu tampil selesai, tidak bisa diubah
                    return `
                    <div class="s-task-row" style="opacity:0.5;">
                        <button class="task-toggle done" disabled title="Diarsipkan — semua siswa selesai" style="cursor:default;">
                            <i class="fa-solid fa-check" style="margin:0;"></i>
                        </button>
                        <div class="t-label">
                            <div class="t-label-title">${esc(task.big_title)}</div>
                            ${task.title ? `<div class="t-label-sub">${esc(task.title)}</div>` : ''}
                        </div>
                        <span class="t-mapel" style="opacity:0.5;">${esc(task.subject_id)}</span>
                    </div>`;
                }
                const isDone = doneSet.has(String(task.id));
                return `
                <div class="s-task-row">
                    <button class="task-toggle ${isDone ? 'done' : ''}"
                        id="stoggle-${studentId}-${task.id}"
                        onclick="toggleTask('${studentId}','${task.id}',this)">
                        ${isDone ? '<i class="fa-solid fa-check" style="margin:0;"></i>' : ''}
                    </button>
                    <div class="t-label">
                        <div class="t-label-title">${esc(task.big_title)}</div>
                        ${task.title ? `<div class="t-label-sub">${esc(task.title)}</div>` : ''}
                    </div>
                    <span class="t-mapel">${esc(task.subject_id)}</span>
                </div>`;
            };

            let html = active.map(buildRow).join('');
            if (archived.length > 0) {
                html += `<div style="text-align:center;color:#333;font-size:10px;letter-spacing:0.8px;padding:6px 0;margin-top:4px;border-top:1px solid rgba(255,255,255,0.05);">
                    <i class="fa-solid fa-archive" style="margin-right:4px;"></i>DIARSIPKAN (${archived.length})
                </div>`;
                html += archived.map(buildRow).join('');
            }
            return html;
        }

        function toggleStudentCard(id) {
            document.getElementById(`sc-${id}`)?.classList.toggle('open');
        }

        async function toggleTask(studentId, taskId, btn) {
            const wasDone = btn.classList.contains('done');
            btn.className = 'task-toggle spinning';
            btn.innerHTML = '';
            try {
                if (wasDone) {
                    const { error } = await supabase.from('user_progress').delete()
                        .eq('user_id', studentId).eq('announcement_id', taskId);
                    if (error) throw error;
                    progressMap[studentId]?.delete(String(taskId));
                } else {
                    const { error } = await supabase.from('user_progress')
                        .insert({ user_id: studentId, announcement_id: taskId });
                    // 23505 = duplicate key, berarti sudah ada — aman diabaikan
                    if (error && error.code !== '23505') throw error;
                    if (!progressMap[studentId]) progressMap[studentId] = new Set();
                    progressMap[studentId].add(String(taskId));
                }
                btn.className = `task-toggle ${!wasDone ? 'done' : ''}`;
                btn.innerHTML = !wasDone ? '<i class="fa-solid fa-check" style="margin:0;"></i>' : '';
                refreshStudentBar(studentId);
                updateStats();

                // Auto-arsip: kalau baru mark done, cek apakah semua siswa sudah selesai
                if (!wasDone) {
                    await _checkAndArchiveAll([taskId]);
                    // Kalau task diarsipkan, refresh row siswa ini juga
                    const task = allTasks.find(t => String(t.id) === String(taskId));
                    if (task?.is_done) {
                        document.getElementById(`strows-${studentId}`).innerHTML = buildStudentTaskRows(studentId);
                        refreshStudentBar(studentId);
                    }
                }
            } catch (err) {
                btn.className = `task-toggle ${wasDone ? 'done' : ''}`;
                btn.innerHTML = wasDone ? '<i class="fa-solid fa-check" style="margin:0;"></i>' : '';
                showToast('Gagal update', 'error');
            }
        }

        async function bulkStudent(studentId, markDone) {
            const panel = document.getElementById(`stp-${studentId}`);
            panel?.querySelectorAll('button').forEach(b => b.disabled = true);
            try {
                if (markDone) {
                    // Hanya proses task yang AKTIF (belum diarsipkan)
                    const activeTasks = allTasks.filter(t => !t.is_done);
                    if (activeTasks.length === 0) {
                        showToast('Semua tugas sudah diarsipkan.', 'info');
                    } else {
                        // Fetch yang sudah ada di DB beneran untuk siswa ini
                        const { data: existing } = await supabase
                            .from('user_progress')
                            .select('announcement_id')
                            .eq('user_id', studentId);

                        const existingIds = new Set((existing || []).map(r => String(r.announcement_id)));
                        const toInsert = activeTasks
                            .filter(t => !existingIds.has(String(t.id)))
                            .map(t => ({ user_id: studentId, announcement_id: t.id }));

                        for (let i = 0; i < toInsert.length; i += 50) {
                            const { error } = await supabase.from('user_progress')
                                .insert(toInsert.slice(i, i + 50));
                            if (error && error.code !== '23505') throw error;
                        }

                        if (!progressMap[studentId]) progressMap[studentId] = new Set();
                        activeTasks.forEach(t => progressMap[studentId].add(String(t.id)));
                        showToast('Semua tugas aktif diselesaikan!', 'success');

                        // Auto-cek: ada task yang sekarang semua siswa sudah done? → arsipkan
                        await _checkAndArchiveAll(activeTasks.map(t => t.id));
                    }
                } else {
                    // Reset: hapus semua progress siswa ini untuk task aktif saja
                    const activeTaskIds = allTasks.filter(t => !t.is_done).map(t => t.id);
                    if (activeTaskIds.length > 0) {
                        const { error } = await supabase.from('user_progress').delete()
                            .eq('user_id', studentId)
                            .in('announcement_id', activeTaskIds);
                        if (error) throw error;
                    }
                    allTasks.filter(t => !t.is_done).forEach(t => progressMap[studentId]?.delete(String(t.id)));
                    showToast('Progress direset.', 'info');
                }
                document.getElementById(`strows-${studentId}`).innerHTML = buildStudentTaskRows(studentId);
                refreshStudentBar(studentId);
                updateStats();
            } catch (err) {
                showToast('Gagal: ' + err.message, 'error');
            } finally {
                panel?.querySelectorAll('button').forEach(b => b.disabled = false);
            }
        }

        // Cek task mana yang sekarang sudah done oleh semua siswa → auto-arsip
        async function _checkAndArchiveAll(taskIds) {
            const n = allStudents.length;
            if (!n) return;
            for (const taskId of taskIds) {
                const taskIdStr = String(taskId);
                // Sudah diarsipkan, skip
                const task = allTasks.find(t => String(t.id) === taskIdStr);
                if (!task || task.is_done) continue;

                const doneCount = allStudents.filter(s =>
                    (progressMap[s.id] || new Set()).has(taskIdStr)
                ).length;

                if (doneCount >= n) {
                    // Semua selesai → arsipkan
                    const { error: upErr } = await supabase
                        .from('subject_announcements').update({ is_done: true }).eq('id', taskId);
                    if (upErr) continue;

                    await supabase.from('user_progress').delete().eq('announcement_id', taskId);

                    task.is_done = true;
                    allStudents.forEach(s => progressMap[s.id]?.delete(taskIdStr));
                    showToast(`"${task.big_title}" diarsipkan otomatis 🎉`, 'success');
                }
            }
            // Re-render task list kalau ada yang berubah
            if (currentView === 'task') renderTasks();
            updateStats();
        }

        function refreshStudentBar(studentId) {
            const total = allTasks.length;
            const archivedCount = allTasks.filter(t => t.is_done).length;
            const activeTaskIds = new Set(allTasks.filter(t => !t.is_done).map(t => String(t.id)));
            const activeDone = [...(progressMap[studentId] || [])].filter(id => activeTaskIds.has(id)).length;
            const done = activeDone + archivedCount;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            const color = pct === 100 ? '#0be881' : pct >= 60 ? '#ff8c00' : '#ff4757';

            const bar = document.getElementById(`sbar-${studentId}`);
            const pctEl = document.getElementById(`spct-${studentId}`);
            const sub = document.getElementById(`ssub-${studentId}`);
            if (bar) { bar.style.width = pct + '%'; bar.style.background = color; }
            if (pctEl) { pctEl.innerText = pct + '%'; pctEl.style.color = color; }
            if (sub) sub.innerText = `${done}/${total} selesai`;
        }

        function buildCard(task) {
            const { id, big_title, title, content, small, subject_id, card_color, done, pct, is_done } = task;
            const n = allStudents.length;
            const color = is_done ? '#0be881' : (pct === 100 ? '#0be881' : pct >= 60 ? '#ff8c00' : '#ff4757');
            const colorClass = card_color && card_color !== 'default' ? `color-${card_color}` : '';

            const el = document.createElement('div');
            el.className = `course-card ${colorClass}`;
            el.style.opacity = is_done ? '0.65' : '1';

            const archivedBadge = is_done
                ? `<span style="display:inline-block;background:rgba(11,232,129,0.15);color:#0be881;border:1px solid rgba(11,232,129,0.3);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;margin-bottom:8px;letter-spacing:0.5px;">✓ DIARSIPKAN</span><br>`
                : '';

            const bulkBanner = is_done
                ? `<div class="bulk-banner">
                    <div class="bulk-progress">
                        <small style="color:#0be881;font-size:12px;"><i class="fa-solid fa-circle-check"></i> Semua siswa selesai — progress dihapus dari DB</small>
                    </div>
                    <div class="bulk-actions">
                        <button class="btn-bulk-reset" id="breset-${id}" onclick="bulkTask('${id}', false)">
                            <i class="fa-solid fa-rotate-left" style="margin:0;"></i> Un-arsip
                        </button>
                    </div>
                </div>`
                : `<div class="bulk-banner">
                    <div class="bulk-progress">
                        <div class="bulk-bar-wrap">
                            <div class="bulk-bar" id="bar-${id}" style="width:${pct}%;background:${color};"></div>
                        </div>
                        <div class="bulk-count" id="cnt-${id}" style="color:${color};">${done}/${n} selesai</div>
                    </div>
                    <div class="bulk-actions">
                        <button class="btn-bulk-done" id="bdone-${id}" onclick="bulkTask('${id}', true)">
                            <i class="fa-solid fa-check-double" style="margin:0;"></i> Arsipkan Semua
                        </button>
                        <button class="btn-bulk-reset" id="breset-${id}" onclick="bulkTask('${id}', false)">
                            <i class="fa-solid fa-rotate-left" style="margin:0;"></i> Reset
                        </button>
                    </div>
                </div>`;

            el.innerHTML = `
                ${archivedBadge}
                <span class="mapel-badge">${esc(subject_id)}</span>
                ${big_title ? `<h3 style="margin:0 0 6px;">${big_title}</h3>` : ''}
                ${title ? `<h4 style="margin:0 0 10px;">${title}</h4>` : ''}
                ${content ? `<div style="margin-bottom:14px;font-size:14px;line-height:1.65;color:#ccc;">${content}</div>` : ''}
                ${small ? `<small style="color:#666;display:block;margin-bottom:2px;">${esc(small)}</small>` : ''}
                ${bulkBanner}`;

            return el;
        }

        async function bulkTask(taskId, markDone) {
            const btnDone = document.getElementById(`bdone-${taskId}`);
            const btnReset = document.getElementById(`breset-${taskId}`);
            [btnDone, btnReset].forEach(b => { if (b) b.disabled = true; });
            if (btnDone) btnDone.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin:0;"></i>';

            try {
                if (markDone) {
                    // ── ARSIP: set is_done = true, hapus semua progress row ──
                    // Tidak perlu insert user_progress dulu — langsung arsip saja.
                    // Data progress row = 0 untuk task ini, UI admin tetap bisa lihat (is_done=true).
                    const confirmed = await showPopup(
                        `Arsipkan tugas ini? <br><small style="opacity:0.7">Progress semua siswa akan dianggap selesai dan dihapus dari tabel (hemat kuota). Task tetap terlihat di panel ini sebagai arsip.</small>`,
                        'confirm'
                    );
                    if (!confirmed) { [btnDone, btnReset].forEach(b => { if (b) b.disabled = false; }); return; }

                    // 1. Flag is_done = true
                    const { error: upErr } = await supabase
                        .from('subject_announcements')
                        .update({ is_done: true })
                        .eq('id', taskId);
                    if (upErr) throw upErr;

                    // 2. Hapus semua progress row untuk task ini
                    const { error: delErr } = await supabase
                        .from('user_progress').delete()
                        .eq('announcement_id', taskId);
                    if (delErr) throw delErr;

                    // 3. Update local state
                    const taskIdx = allTasks.findIndex(t => String(t.id) === String(taskId));
                    if (taskIdx !== -1) allTasks[taskIdx].is_done = true;
                    allStudents.forEach(s => progressMap[s.id]?.delete(String(taskId)));
                    sessionStorage.setItem('task_badge_dirty', '1'); // invalidate badge cache siswa

                    showToast('Tugas diarsipkan! Progress dihapus dari DB 🎉', 'success');
                } else {
                    // ── UN-ARSIP: kembalikan is_done = false ──
                    const { error: upErr } = await supabase
                        .from('subject_announcements')
                        .update({ is_done: false })
                        .eq('id', taskId);
                    if (upErr) throw upErr;

                    const taskIdx = allTasks.findIndex(t => String(t.id) === String(taskId));
                    if (taskIdx !== -1) allTasks[taskIdx].is_done = false;

                    // Rebuild card itu langsung in-place (tanpa re-render seluruh list)
                    _rebuildCard(taskId);
                    updateStats();
                    showToast('Tugas di-unarsip. Siswa perlu centang ulang.', 'info');
                    return; // skip refreshCard + updateStats di bawah (sudah done di atas)
                }

                refreshCard(taskId);
                updateStats();
            } catch (err) {
                showToast('Gagal: ' + err.message, 'error');
            } finally {
                if (btnDone) {
                    btnDone.disabled = false;
                    btnDone.innerHTML = '<i class="fa-solid fa-check-double" style="margin:0;"></i> Arsipkan Semua';
                }
                if (btnReset) btnReset.disabled = false;
            }
        }

        async function bulkAllConfirm() {
            const activeTasks = allTasks.filter(t => !t.is_done);
            if (activeTasks.length === 0) {
                showToast('Semua tugas sudah diarsipkan.', 'info');
                return;
            }

            const confirmed = await showPopup(
                `Arsipkan SEMUA ${activeTasks.length} tugas aktif? <br><small style="opacity:0.7">Semua progress row akan dihapus dari DB. Siswa dianggap selesai semua.</small>`, 'confirm'
            );
            if (!confirmed) return;

            const btn = document.getElementById('btnBulkAll');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mengarsipkan...';

            try {
                const activeIds = activeTasks.map(t => t.id);

                // 1. Set semua is_done = true — batch per 50 ID
                for (let i = 0; i < activeIds.length; i += 50) {
                    const batch = activeIds.slice(i, i + 50);
                    const { error } = await supabase
                        .from('subject_announcements')
                        .update({ is_done: true })
                        .in('id', batch);
                    if (error) throw error;
                }

                // 2. Hapus semua progress row untuk task-task itu
                for (let i = 0; i < activeIds.length; i += 50) {
                    const batch = activeIds.slice(i, i + 50);
                    await supabase.from('user_progress').delete().in('announcement_id', batch);
                }

                // 3. Update local state
                activeTasks.forEach(t => {
                    t.is_done = true;
                    allStudents.forEach(s => progressMap[s.id]?.delete(String(t.id)));
                });

                renderTasks();
                updateStats();
                showToast(`${activeTasks.length} tugas berhasil diarsipkan! 🎉`, 'success');
            } catch (err) {
                showToast('Gagal: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-check-double"></i> Arsipkan SEMUA Tugas';
            }
        }

        // Ganti satu card in-place tanpa re-render seluruh list
        function _rebuildCard(taskId) {
            const taskIdStr = String(taskId);
            const task = allTasks.find(t => String(t.id) === taskIdStr);
            if (!task) return;

            // Cari elemen card lama di DOM
            // Card di-render lewat buildCard() yang return <div class="course-card">
            // Tidak ada data-id di card, jadi cari via bar/cnt id atau tombol
            const container = document.getElementById('taskList');
            if (!container) return;

            // Hitung done/pct untuk card ini (state lokal)
            const n = allStudents.length;
            const done = task.is_done ? n : allStudents.filter(s => (progressMap[s.id] || new Set()).has(taskIdStr)).length;
            const pct = task.is_done ? 100 : (n > 0 ? Math.round((done / n) * 100) : 0);
            const enriched = { ...task, done, pct };
            const newCard = buildCard(enriched);

            // Cari card lama: card yang mengandung btn dengan id bdone-X atau breset-X
            const oldBtn = document.getElementById(`bdone-${taskId}`) || document.getElementById(`breset-${taskId}`);
            const oldCard = oldBtn?.closest('.course-card');
            if (oldCard && oldCard.parentNode) {
                oldCard.parentNode.replaceChild(newCard, oldCard);
            } else {
                // Fallback: re-render full list
                renderTasks();
            }
        }

        function refreshCard(taskId) {
            const taskIdStr = String(taskId);
            const task = allTasks.find(t => String(t.id) === taskIdStr);
            if (!task) return;

            if (task.is_done) {
                // Task diarsipkan — re-render seluruh task list (struktur card berubah total)
                renderTasks();
                return;
            }

            // Task aktif — cukup update bar dan count saja
            const n = allStudents.length;
            const done = allStudents.filter(s => (progressMap[s.id] || new Set()).has(taskIdStr)).length;
            const pct = n > 0 ? Math.round((done / n) * 100) : 0;
            const color = pct === 100 ? '#0be881' : pct >= 60 ? '#ff8c00' : '#ff4757';

            const bar = document.getElementById(`bar-${taskId}`);
            const cnt = document.getElementById(`cnt-${taskId}`);
            if (bar) { bar.style.width = pct + '%'; bar.style.background = color; }
            if (cnt) { cnt.innerText = `${done}/${n} selesai`; cnt.style.color = color; }
        }

        function esc(str) {
            return str ? String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
        }
    </script>
</body>
