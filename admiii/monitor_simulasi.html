<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Simulasi • Admin Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js?v=20260619" defer></script>
    <script src="../js/ctx-menu.js?v=20260619"></script>
    <script src="../js/ui-components.js?v=20260619" defer></script>
    <script src="../js/sidebar.js?v=20260619"></script>
    <script src="../js/lang.js?v=20260619"></script>
    <script src="../js/basicfeat.js?v=20260619"></script>
    <script src="../js/show-popup.js?v=20260619"></script>
    <script src="../js/auth.js?v=20260619" defer></script>
    <script src="../js/theme.js?v=20260619"></script>
    <script src="../js/toast.js?v=20260619"></script>
    <script src="../js/bottom-nav.js?v=20260619"></script>
    <script src="../js/footer.js?v=20260619"></script>
    <link rel="stylesheet" href="../css/styleasli.css?v=20260619">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
        }

        .monitor-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            opacity: 0.7;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.95rem;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-completed {
            background: rgba(46, 213, 115, 0.1);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .status-ongoing {
            background: rgba(255, 159, 67, 0.1);
            color: #ff9f43;
            border: 1px solid rgba(255, 159, 67, 0.3);
        }

        .status-stopped {
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .progress-pill {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            outline: none;
        }
    </style>
</head>

<body>

    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">
        <div class="admin-container">
            <div class="glow" style="margin-bottom: 25px;">
                <h1><i class="fa-solid fa-chart-line"></i> Monitor Simulasi</h1>
                <p style="opacity: 0.7;">Pantau progres simulasi siswa secara real-time.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Participant</h3>
                    <p id="statTotalUsers">0</p>
                </div>
                <div class="stat-card">
                    <h3 data-i18n="done">Done</h3>
                    <p id="statCompleted">0</p>
                </div>
                <div class="stat-card">
                    <h3>Ongoing</h3>
                    <p id="statOngoing">0</p>
                </div>
            </div>

            <div class="monitor-card">
                <div class="filter-bar">
                    <select id="filterClass" class="form-control">
                        <option value="all" data-i18n="all_classes">Semua Kelas</option>
                        <option value="1">Kelas 1</option>
                        <option value="2">Kelas 2</option>
                        <option value="3">Kelas 3</option>
                        <option value="4">Kelas 4</option>
                    </select>
                    <select id="filterSubject" class="form-control">
                        <option value="all" data-i18n="all_subjects">Semua Mapel</option>
                    </select>
                    <button onclick="MonitorSim.loadData()" class="form-control"
                        style="cursor:pointer; background:var(--accent); color:black; font-weight:bold; border:none;">
                        <i class="fa-solid fa-sync"></i> <span data-i18n="refresh">Refresh</span>
                    </button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th data-i18n="student_name">Siswa</th>
                            <th data-i18n="class">Kelas</th>
                            <th data-i18n="subject_lesson">Mata Pelajaran</th>
                            <th>Progres</th>
                            <th data-i18n="status_label">Status</th>
                            <th>Terakhir Aktif</th>
                        </tr>
                    </thead>
                    <tbody id="monitorBody">
                    </tbody>
                </table>

                
            </div>
        </div>
    </div>

    <script src="jsadmiii/monitor_simulasi.js" defer></script>

</body>

</html>
