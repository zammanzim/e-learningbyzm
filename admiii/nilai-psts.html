<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Input Nilai PSTS • E-Learning Nizam</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-clients.js" defer></script>
    <script src="../js/basicfeat.js" defer></script>
    <script src="../js/ui-components.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/theme.js"></script>
<script src="../js/toast.js"></script>
<link rel="stylesheet" href="../css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 191, 255, 0.05);
            border: 1px solid rgba(0, 191, 255, 0.3);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00eaff;
            font-weight: 600;
        }

        .admin-input,
        .admin-select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .admin-input:focus,
        .admin-select:focus {
            border-color: #00eaff;
            box-shadow: 0 0 10px rgba(0, 234, 255, 0.2);
        }

        .nilai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            margin-top: 30px;
            background: linear-gradient(135deg, rgba(0, 234, 255, 0.8), rgba(0, 150, 255, 0.8));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 234, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- ══ MAIN CONTENT ══ -->
    <div class="main-content">
        <div class="left-section">
            <h1 style="color:#00eaff; margin-bottom:10px;">Input Nilai PSTS</h1>
            <p style="opacity:0.8; margin-bottom:30px;">Pilih nickname siswa, isi nilai, lalu simpan.</p>

            <div class="admin-container">
                <!-- Pilih Siswa -->
                <div class="input-group">
                    <label><i class="fa-solid fa-user"></i> Pilih Siswa (Nickname)</label>
                    <select id="studentSelect" class="admin-select" onchange="loadStudentData()">
                        <option value="">-- Pilih Nama Siswa --</option>
                    </select>
                </div>

                <hr style="border-color:rgba(255,255,255,0.1); margin:25px 0;">

                <!-- Input Nilai -->
                <label><i class="fa-solid fa-list-ol"></i> Input Nilai Mata Pelajaran</label>
                <div class="nilai-grid">
                    <div><label style="font-size:12px; color:#fff;">PABP</label>         <input type="number" id="inp_pabp"        class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">PP</label>           <input type="number" id="inp_pp"          class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">B. Indonesia</label> <input type="number" id="inp_bindo"       class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">B. Inggris</label>   <input type="number" id="inp_bing"        class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">Matematika</label>   <input type="number" id="inp_mtk"         class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">Sejarah</label>      <input type="number" id="inp_sejarah"     class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">B. Jepang</label>    <input type="number" id="inp_bjepang"     class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">B. Sunda</label>     <input type="number" id="inp_bsunda"      class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">Seni Budaya</label>  <input type="number" id="inp_senibudaya"  class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">Informatika</label>  <input type="number" id="inp_informatika" class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">PJOK</label>         <input type="number" id="inp_pjok"        class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">Proipas</label>      <input type="number" id="inp_proipas"     class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">DASPROGRPL 1</label> <input type="number" id="inp_dasprog1"    class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">DASPROGRPL 2</label> <input type="number" id="inp_dasprog2"    class="admin-input" placeholder="0"></div>
                    <div><label style="font-size:12px; color:#fff;">DASPROGRPL 3</label> <input type="number" id="inp_dasprog3"    class="admin-input" placeholder="0"></div>
                </div>

                <button onclick="saveNilai()" class="btn-save" id="btnSave">
                    <i class="fa-solid fa-floppy-disk"></i> SIMPAN DATA
                </button>
            </div>
        </div>
    </div>

    <!-- ══ SCRIPT ══ -->
    <script>
        const MAPEL_IDS   = ['pabp','pp','bindo','bing','mtk','sejarah','bjepang','bsunda','senibudaya','informatika','pjok','proipas','dasprog1','dasprog2','dasprog3'];
        const adminClass  = JSON.parse(localStorage.getItem("user"))?.class_id;

        // ── Init ──
        document.addEventListener("DOMContentLoaded", () => {
            loadUsers();
        });

        // ── Load dropdown siswa sesuai kelas ──
        async function loadUsers() {
            if (!adminClass) {
                alert("Error: Class ID tidak ditemukan. Coba login ulang.");
                return;
            }

            const { data, error } = await supabase
                .from('users')
                .select('nickname')
                .eq('class_id', adminClass)
                .neq('nickname', null)
                .order('nickname', { ascending: true });

            if (error) { console.error("Gagal load users:", error); return; }

            const select = document.getElementById('studentSelect');
            select.innerHTML = '<option value="">-- Pilih Nama Siswa --</option>';
            data.forEach(u => {
                if (u.nickname) {
                    const opt = document.createElement('option');
                    opt.value = opt.text = u.nickname;
                    select.appendChild(opt);
                }
            });
        }

        // ── Auto-fill data lama ──
        async function loadStudentData() {
            const nama = document.getElementById('studentSelect').value;
            if (!nama) { resetForm(); return; }

            const { data } = await supabase
                .from('nilai_psts')            // <-- Tabel PSTS
                .select('*')
                .eq('nama_siswa', nama)
                .eq('class_id', adminClass)
                .single();

            if (data) {
                MAPEL_IDS.forEach(id => {
                    const el = document.getElementById('inp_' + id);
                    if (el) el.value = data[id] !== null ? parseFloat(data[id]).toFixed(2) : '';
                });
                document.getElementById('btnSave').innerText = `UPDATE DATA (${nama})`;
            } else {
                resetForm();
                document.getElementById('btnSave').innerText = "SIMPAN DATA BARU";
            }
        }

        // ── Reset form ──
        function resetForm() {
            MAPEL_IDS.forEach(id => {
                const el = document.getElementById('inp_' + id);
                if (el) el.value = '';
            });
            document.getElementById('btnSave').innerText = "SIMPAN DATA";
        }

        // ── Simpan ke Supabase (upsert) ──
        async function saveNilai() {
            const nama = document.getElementById('studentSelect').value;
            if (!nama) { alert("Pilih nama siswa dulu!"); return; }

            const btn       = document.getElementById('btnSave');
            btn.disabled    = true;
            btn.innerText   = "Menyimpan...";

            const payload = { nama_siswa: nama, class_id: adminClass };
            MAPEL_IDS.forEach(id => {
                const el    = document.getElementById('inp_' + id);
                payload[id] = el && el.value !== "" ? parseFloat(el.value) : null;
            });

            const { error } = await supabase
                .from('nilai_psts')            // <-- Tabel PSTS
                .upsert(payload, { onConflict: 'nama_siswa, class_id' })

            btn.disabled = false;

            if (error) {
                console.error("Error save:", error);
                alert("Gagal simpan: " + error.message);
                btn.innerText = "GAGAL";
            } else {
                alert(`Berhasil disimpan untuk ${nama}!`);
                btn.innerText = "DATA TERSIMPAN";
                setTimeout(() => {
                    if (document.getElementById('studentSelect').value === nama) {
                        btn.innerText = `UPDATE DATA (${nama})`;
                    }
                }, 2000);
            }
        }

        // ── Keyboard shortcuts ──
        document.addEventListener("keydown", (e) => {
            // Ctrl+Enter → Simpan
            if (e.ctrlKey && e.key === "Enter") {
                e.preventDefault();
                saveNilai();
                return;
            }
            // Enter → Pindah ke input berikutnya
            if (e.key === "Enter" && e.target.tagName === "INPUT" && e.target.id.startsWith("inp_")) {
                e.preventDefault();
                const currentIndex = MAPEL_IDS.indexOf(e.target.id.replace("inp_", ""));
                if (currentIndex >= 0 && currentIndex < MAPEL_IDS.length - 1) {
                    const nextInput = document.getElementById("inp_" + MAPEL_IDS[currentIndex + 1]);
                    if (nextInput) { nextInput.focus(); nextInput.select(); }
                } else {
                    document.getElementById("btnSave").focus();
                }
            }
        });
    </script>
</body>

</html>
