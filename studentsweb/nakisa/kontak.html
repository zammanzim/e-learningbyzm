<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakisa - Kontak</title>
    <script src="../../js/magic-pill.js?v=20260619" data-position="top-left" data-offset-x="20" data-offset-y="70"></script><link rel="stylesheet" href="css/style.css"> <style> * { -webkit-tap-highlight-color: transparent; } </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="index" class="logo">Nakisa</a>
            <ul class="nav-links">
                <li><a href="index">Beranda</a></li>
                <li><a href="profil">Profil</a></li>
                <li><a href="galeri">Galeri</a></li>
                <li><a href="kontak">Kontak</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section>
            <h2>Hubungi Saya</h2>
            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="pesan">Pesan</label>
                    <textarea id="pesan" name="pesan" rows="6" required></textarea>
                </div>
                <button type="submit" class="btn">Kirim Pesan</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Web Sederhana. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Terima kasih! Pesan Anda telah dikirim.');
            this.reset();
        });
    </script>
</body>
</html>
