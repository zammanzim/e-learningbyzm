<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontak</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f6f9;
      color:#333;
    }

    /* HEADER */
    .header{
      background:linear-gradient(to right,#1e3c72,#2a5298);
      color:white;
      text-align:center;
      padding:50px 20px;
    }

    .header h1{
      font-size:50px;
      margin-bottom:20px;
    }

    /* NAVBAR */
    nav{
      margin-top:10px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 15px;
      font-weight:bold;
      transition:0.3s;
    }

    nav a:hover{
      color:#ffd700;
    }

    /* CONTAINER */
    .container{
      width:80%;
      margin:40px auto;
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .container h2{
      margin-bottom:20px;
      color:#444;
    }

    /* FORM */
    form label{
      display:block;
      margin:15px 0 5px;
      font-size:18px;
    }

    form input,
    form textarea{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    form textarea{
      height:150px;
      resize:none;
    }

    /* BUTTON */
    button{
      margin-top:20px;
      background:#2a5298;
      color:white;
      border:none;
      padding:12px 25px;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{
      background:#1e3c72;
    }

    /* FOOTER */
    footer{
      text-align:center;
      padding:20px;
      margin-top:30px;
      color:#777;
      font-size:14px;
    }

    /* RESPONSIVE */
    @media(max-width:768px){
      .container{
        width:95%;
      }

      .header h1{
        font-size:36px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Kontak</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#">Profil</a>
      <a href="#">Galeri</a>
      <a href="#">Kontak</a>
    </nav>
  </div>

  <!-- FORM -->
  <div class="container">
    <h2>Kirim Pesan</h2>

    <form>
      <label>Nama:</label>
      <input type="text" placeholder="Masukkan nama...">

      <label>Email:</label>
      <input type="email" placeholder="Masukkan email...">

      <label>Pesan:</label>
      <textarea placeholder="Tulis pesan kamu di sini..."></textarea>

      <button type="submit">Kirim</button>
    </form>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 - Dibuat dengan antusias
  </footer>

</body>
</html>
