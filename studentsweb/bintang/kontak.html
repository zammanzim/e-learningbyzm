<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kontak Saya</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;

            position: relative;

            color: white;

            background:
                linear-gradient(135deg,
                    #1e1e2f,
                    #2b1055,
                    #7597de);
        }

        /* =========================
   MENU GARIS 3
========================= */

        #menu-toggle {
            display: none;
        }

        .hamburger {
            position: fixed;

            top: 20px;
            left: 20px;

            z-index: 1000;

            cursor: pointer;
        }

        .hamburger span {
            display: block;

            width: 32px;
            height: 4px;

            margin: 6px;

            border-radius: 5px;

            background: white;
        }

        /* =========================
   SIDEBAR
========================= */

        .sidebar {
            position: fixed;

            top: 0;
            left: -250px;

            width: 220px;
            height: 100%;

            background:
                rgba(0, 0, 0, 0.4);

            backdrop-filter: blur(10px);

            padding-top: 80px;

            transition: 0.4s;

            z-index: 999;
        }

        .sidebar a {
            display: block;

            padding: 16px 25px;

            text-decoration: none;

            color: white;

            font-size: 18px;

            transition: 0.3s;
        }

        .sidebar a:hover {
            background:
                rgba(255, 255, 255, 0.2);
        }

        #menu-toggle:checked~.sidebar {
            left: 0;
        }

        /* =========================
   CONTAINER
========================= */

        .container {
            width: 90%;
            max-width: 550px;

            padding: 40px;

            border-radius: 25px;

            text-align: center;

            background:
                rgba(255, 255, 255, 0.1);

            backdrop-filter: blur(10px);

            box-shadow:
                0 0 25px rgba(0, 0, 0, 0.3);

            z-index: 2;
        }

        .container h1 {
            font-size: 42px;

            margin-bottom: 10px;
        }

        .container p {
            margin-bottom: 30px;

            color: #e0e0e0;
        }

        /* =========================
   FORM
========================= */

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        input,
        textarea {
            width: 100%;

            padding: 15px;

            border: none;

            outline: none;

            border-radius: 15px;

            background:
                rgba(255, 255, 255, 0.15);

            color: white;

            font-size: 16px;
        }

        input::placeholder,
        textarea::placeholder {
            color: #ddd;
        }

        textarea {
            resize: none;
            height: 140px;
        }

        button {
            padding: 15px;

            border: none;

            border-radius: 15px;

            background: white;

            color: #2b1055;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            background: #7597de;

            color: white;

            transform: scale(1.03);
        }

        /* =========================
   ANIMASI BUBBLE
========================= */

        .bubbles {
            position: absolute;

            width: 100%;
            height: 100%;

            overflow: hidden;

            z-index: 1;
        }

        .bubbles span {
            position: absolute;

            bottom: -120px;

            border-radius: 50%;

            background:
                rgba(255, 255, 255, 0.2);

            animation: bubble 15s linear infinite;
        }

        .bubbles span:nth-child(1) {
            left: 10%;
            width: 40px;
            height: 40px;
            animation-duration: 10s;
        }

        .bubbles span:nth-child(2) {
            left: 25%;
            width: 60px;
            height: 60px;
            animation-duration: 14s;
        }

        .bubbles span:nth-child(3) {
            left: 45%;
            width: 30px;
            height: 30px;
            animation-duration: 8s;
        }

        .bubbles span:nth-child(4) {
            left: 65%;
            width: 70px;
            height: 70px;
            animation-duration: 16s;
        }

        .bubbles span:nth-child(5) {
            left: 85%;
            width: 50px;
            height: 50px;
            animation-duration: 12s;
        }

        @keyframes bubble {

            0% {
                transform: translateY(0);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform:
                    translateY(-1200px) scale(1.5);

                opacity: 0;
            }

        }
    </style>
</head>

<body>

    <!-- MENU GARIS 3 -->
    <input type="checkbox" id="menu-toggle">

    <label for="menu-toggle" class="hamburger">

        <span></span>
        <span></span>
        <span></span>

    </label>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <a href="index.html">
            👤 Profil
        </a>

        <a href="galeri.html">
            📸 Galeri
        </a>

        <a href="kontak.html" class="active">
            📞 Kontak
        </a>

        <a href="biodata.html">
            📝 Biodata
        </a>

    </div>

    <!-- BUBBLE -->
    <div class="bubbles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- CONTENT -->
    <div class="container">

        <h1>Kontak Saya</h1>

        <p>
            Silakan kirim pesan melalui form berikut.
        </p>

        <form>

            <input type="text" placeholder="Nama Pengirim" required>

            <input type="text" placeholder="For Who?" required>

            <textarea placeholder="Kata Kata" required>

</textarea>

            <button type="submit">
                Kirim Pesan
            </button>

        </form>

    </div>

</body>

</html>
