<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="../../js/magic-pill.js?v=20260618" data-position="top-right" data-offset-x="20" data-offset-y="20"></script>

    <title>Bintang - Web Estetik</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;

            position: relative;

            color: white;

            background:
                linear-gradient(135deg,
                    #1e1e2f,
                    #2b1055,
                    #7597de);
        }

        /* =========================
   MENU GARIS 3
========================= */

        #menu-toggle {
            display: none;
        }

        .hamburger {
            position: fixed;

            top: 20px;
            left: 20px;

            z-index: 1000;

            cursor: pointer;
        }

        .hamburger span {
            display: block;

            width: 32px;
            height: 4px;

            margin: 6px;

            border-radius: 5px;

            background: white;
        }

        /* SIDEBAR */

        .sidebar {
            position: fixed;

            top: 0;
            left: -250px;

            width: 220px;
            height: 100%;

            background:
                rgba(0, 0, 0, 0.4);

            backdrop-filter: blur(10px);

            padding-top: 80px;

            transition: 0.4s;

            z-index: 999;
        }

        .sidebar a {
            display: block;

            padding: 16px 25px;

            text-decoration: none;

            color: white;

            font-size: 18px;

            transition: 0.3s;
        }

        .sidebar a:hover {
            background:
                rgba(255, 255, 255, 0.2);
        }

        #menu-toggle:checked~.sidebar {
            left: 0;
        }

        /* =========================
   CONTAINER
========================= */

        .container {
            width: 90%;
            max-width: 850px;

            padding: 40px;

            border-radius: 25px;

            text-align: center;

            background:
                rgba(255, 255, 255, 0.1);

            backdrop-filter: blur(10px);

            box-shadow:
                0 0 25px rgba(0, 0, 0, 0.3);

            z-index: 2;
        }

        .container h1 {
            font-size: 45px;
            margin-bottom: 15px;
        }

        .container p {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        /* =========================
   FOTO PROFIL
========================= */

        .profile-box {
            margin-bottom: 35px;
        }

        .profile-img {
            width: 180px;
            height: 180px;

            object-fit: cover;

            border-radius: 50%;

            border: 4px solid white;

            margin-bottom: 15px;

            box-shadow:
                0 0 15px rgba(255, 255, 255, 0.4);
        }

        input[type="file"] {
            display: none;
        }

        .upload-btn {
            display: inline-block;

            padding: 12px 22px;

            border-radius: 12px;

            background: white;

            color: #2b1055;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        .upload-btn:hover {
            background: #7597de;

            color: white;

            transform: scale(1.05);
        }

        /* =========================
   MENU TENGAH
========================= */

        .menu-center {
            margin-top: 25px;
        }

        .menu-center a {
            display: inline-block;

            margin: 10px;
            padding: 14px 24px;

            text-decoration: none;

            border-radius: 12px;

            background: white;

            color: #2b1055;

            font-weight: bold;

            transition: 0.3s;
        }

        .menu-center a:hover {
            background: #7597de;

            color: white;

            transform: scale(1.08);
        }

        /* =========================
   ANIMASI BUBBLE
========================= */

        .bubbles {
            position: absolute;

            width: 100%;
            height: 100%;

            overflow: hidden;

            z-index: 1;
        }

        .bubbles span {
            position: absolute;

            bottom: -120px;

            border-radius: 50%;

            background:
                rgba(255, 255, 255, 0.2);

            animation: bubble 15s linear infinite;
        }

        .bubbles span:nth-child(1) {
            left: 10%;
            width: 40px;
            height: 40px;
            animation-duration: 10s;
        }

        .bubbles span:nth-child(2) {
            left: 25%;
            width: 60px;
            height: 60px;
            animation-duration: 14s;
        }

        .bubbles span:nth-child(3) {
            left: 45%;
            width: 30px;
            height: 30px;
            animation-duration: 8s;
        }

        .bubbles span:nth-child(4) {
            left: 65%;
            width: 70px;
            height: 70px;
            animation-duration: 16s;
        }

        .bubbles span:nth-child(5) {
            left: 85%;
            width: 50px;
            height: 50px;
            animation-duration: 12s;
        }

        @keyframes bubble {

            0% {
                transform: translateY(0);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform:
                    translateY(-1200px) scale(1.5);

                opacity: 0;
            }

        }
    </style>
</head>

<body>

    <!-- MENU GARIS 3 -->
    <input type="checkbox" id="menu-toggle">

    <label for="menu-toggle" class="hamburger">

        <span></span>
        <span></span>
        <span></span>

    </label>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <a href="index" class="active">
            👤 Profil
        </a>

        <a href="galeri">
            📸 Galeri
        </a>

        <a href="kontak">
            📞 Kontak
        </a>

        <a href="biodata">
            📝 Biodata
        </a>

    </div>

    <!-- BUBBLE -->
    <div class="bubbles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- CONTENT -->
    <div class="container">

        <h1>Profil Saya</h1>

        <p>
            Selamat Datang di Website Saya
        </p>

        <!-- FOTO PROFIL -->
        <div class="profile-box">

            <img src="img/file_000000002b2871fa9b46eb77f464367c.png" id="profilePreview" class="profile-img">

            <br>

            <label for="uploadPhoto" class="upload-btn">

                Ganti Foto Profil

            </label>

            <input type="file" id="uploadPhoto" accept="image/*">

        </div>

        <!-- KONTAK -->
        <section id="kontak" class="kontak">
            <h2>Kontak</h2>
            <p> 📧bintngalm1706.gmail.com</p>
            <p> 📱083841765758</p>
            <p> 📍Indonesia Raya</p>
        </section>

    </div>

    <script>

        /* =========================
           FOTO PROFIL PERMANEN
        ========================= */

        const uploadPhoto =
            document.getElementById(
                "uploadPhoto"
            );

        const profilePreview =
            document.getElementById(
                "profilePreview"
            );

        /* AMBIL FOTO DARI STORAGE */

        const savedImage =
            localStorage.getItem(
                "profileImage"
            );

        if (savedImage) {

            profilePreview.src =
                savedImage;

        }

        /* GANTI FOTO */

        uploadPhoto.addEventListener(
            "change",
            function () {

                const file =
                    this.files[0];

                if (file) {

                    const reader =
                        new FileReader();

                    reader.onload =
                        function (e) {

                            const imageData =
                                e.target.result;

                            /* TAMPILKAN FOTO */

                            profilePreview.src =
                                imageData;

                            /* SIMPAN FOTO */

                            localStorage.setItem(
                                "profileImage",
                                imageData
                            );

                        }

                    reader.readAsDataURL(file);

                }

            }
        );

    </script>

</body>

</html>
