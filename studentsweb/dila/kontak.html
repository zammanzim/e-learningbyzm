<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dila - Kontak</title>
        <script src="../../js/magic-pill.js?v=20260615" data-position="top-left" data-offset-x="20" data-offset-y="80"></script><link rel="stylesheet" href="css/style.css?v=20260615"> <style> * { -webkit-tap-highlight-color: transparent; } </style>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css?v=20260615" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-user-astronaut"></i> Portfolio
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html#home" class="nav-link">Beranda</a></li>
                <li class="nav-item"><a href="profil" class="nav-link">Profil</a></li>
                <li class="nav-item"><a href="galeri" class="nav-link">Galeri</a></li>
                <li class="nav-item"><a href="kontak" class="nav-link active">Kontak</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="section-header">
                <h1 class="section-title">Hubungi Dila</h1>
                <p class="section-subtitle">Ini tugas dila kirana, kalo ada kesalahan bisa hubungi di bawah ini</p>
            </div>
            
            <div class="contact-content">
                <div class="contact-info">
                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h3>Instagram</h3>
                            <p>dilaa_krnaaaa</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-phone"></i>
                        <div>
                            <h3>Telepon</h3>
                            <p>+62 838 7521 6752</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h3>Alamat</h3>
                            <p>Bandung barat, cipatat-citatah</p>
                        </div>
                    </div>
                </div>
                
                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <input type="text" id="name" name="name" placeholder="Nama Lengkap" required>
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" name="email" placeholder="Email" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="form-group">
                        <textarea id="message" name="message" placeholder="Pesan Anda..." rows="5" required></textarea>
                        <i class="fas fa-comment"></i>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Kirim Pesan</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
