<!DOCTYPE html>
<html lang="id">

  <meta charset="UTF-8">

  <header>
    <div class="container">
      <h1>Kontak Saya</h1>
      <nav>

          <li><a href="kontak.html">Kontak</a></li>
        </ul>
      </nav>

  </header>

  <div class="container">
    <div class="content">
      <h2>Hubungi Saya</h2>
      <p>Punya pertanyaan atau mau kerja sama? Kirim pesan lewat form di bawah ini:</p>
      <form action="#" method="post">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" placeholder="Masukkan nama kamu" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Masukkan email kamu" required>

        <label for="pesan">Pesan:</label>
        <textarea id="pesan" name="pesan" rows="5" placeholder="Tulis pesanmu di sini..." required></textarea>

        <button type="submit">Kirim Pesan</button>
      </form>
    </div>
  </div>

  <div class="container">
    <footer>
      <p>&copy; 2026 Profil Saya. Dibuat dengan semangat belajar.</p>
    </footer>
  </div>
