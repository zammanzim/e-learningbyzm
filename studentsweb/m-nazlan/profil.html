<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

<style>
    .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a1a1a, #2c3e50);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.8s ease-out;
    }

    .loader {
        width: 60px;
        height: 60px;
        border: 4px solid #34495e;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        margin-bottom: 20px;
    }

    .loader-text {
        color: #ecf0f1;
        font-size: 1.2rem;
        font-weight: bold;
        animation: pulse 1.5s ease-in-out infinite alternate;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    @keyframes pulse {
        0% {
            opacity: 0.6;
        }

        100% {
            opacity: 1;
        }
    }
</style>

<body>
    <header>
        <nav>
            <div class="logo">Nazlan X-RPL2</div>
            <ul>
                <li><a href="index">🏠</a></li>
                <li><a href="profil">👤</a></li>
                <li><a href="galeri">📸</a></li>
                <li><a href="diri" class="active">✨</a></li>
                <li><a href="kontak">✉️</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1 style="font-size:3rem; color:#3498db;">👤 PROFIL</h1>

            <div class="profil">
                <div class="foto-profil">
                    <img src="img/zlan.jpg" alt="Foto Nazlan">
                </div>
                <div class="info">
                    <div class="quick-links">
                        <a href="index" class="cta" style="background:#3498db; padding:10px 20px;">🏠 Beranda</a>
                        <a href="galeri" class="cta" style="background:#e74c3c; padding:10px 20px;">📸 Galeri</a>
                        <a href="kontak" class="cta" style="background:#9b59b6; padding:10px 20px;">✉️ Kontak</a>
                    </div>
                    <div class="biodata">
                        <p><strong>Nama:</strong> Moch.Nazlan Rizqi Ramadhan</p>
                        <p><strong>Kelas:</strong> X-RPL 2</p>
                        <p><strong>Umur:</strong> 17 tahun</p>
                        <p><strong>Hobi:</strong> Sepak Bola, Futsal & Game</p>
                        <p><strong>Pekerjaan:</strong> Pelajar</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Nazlan X-RPL2</p>
    </footer>
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div class="loader-text">Loading...</div>
    </div>
    <script>
        window.addEventListener('load', function () {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.display = 'none', 800);
        });
    </script>
</body>

</html>
