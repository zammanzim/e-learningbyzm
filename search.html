<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Account • E-Learning Nizam</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-clients.js" defer></script>
    <script src="js/basicfeat.js" defer></script>
    <script src="js/ui-components.js"></script>
    <script src="js/auth.js" defer></script>
    <script src="js/visitor.js" defer></script>
    <script src="js/theme.js"></script>
<script src="js/toast.js"></script><script src="js/bottom-nav.js"></script>
<link rel="stylesheet" href="css/styleasli.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="icons/search.png" type="image/png">
</head>

<body>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="main-content">
        <div class="left-section">
            <div class="page-title-header glow" style="margin-bottom: 30px;">
                <h1><i class="fa-solid fa-magnifying-glass"></i> Cari Akun</h1>
            </div>

            <div class="glass-card-effect" style="padding: 20px; border-radius: 15px; margin-bottom: 30px;">
                <input type="text" id="searchInput" class="glass-input" placeholder="Ketik nama atau username...">
            </div>

            <div id="userResultList" class="announcements">
                <p style="text-align: center; color: #aaa; padding: 40px;">Loading...
                </p>
            </div>
        </div>

        <div class="right-section">
        </div>
    </div>


    <script src="js/search.js" defer></script>
</body>

</html>
